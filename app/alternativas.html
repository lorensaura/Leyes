<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5EAD4;
      color: #111111;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #E8D8B8;
      margin-bottom: 3rem;
      text-decoration: none;

    .sidebar-logo span { color: #C41E2E; }
    .nav-section {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,216,184,0.3);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 7px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(232,216,184,0.55);
      transition: all 0.15s;
      margin-bottom: 0.2rem;
    }
    .nav-item:hover { background: rgba(232,216,184,0.06); color: #E8D8B8; }
    .nav-item.active { background: rgba(196,30,46,0.15); color: #E8D8B8; }
    .nav-item.active .nav-icon { color: #C41E2E; }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      font-size: 0.65rem;
      background: rgba(196,30,46,0.2);
      color: #C41E2E;
      padding: 0.1rem 0.45rem;
      border-radius: 100px;
      font-weight: 600;
    }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(232,216,184,0.08);
    }
    .user-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .user-avatar {
      width: 36px; height: 36px;
      background: #C41E2E;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #F5EAD4;
      flex-shrink: 0;
    }
    .user-name { font-size: 0.82rem; font-weight: 600; color: #E8D8B8; }
    .user-plan { font-size: 0.72rem; color: rgba(232,216,184,0.4); }
    .btn-logout {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px solid rgba(232,216,184,0.12);
      border-radius: 6px;
      color: rgba(232,216,184,0.4);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: rgba(196,30,46,0.3); color: #C41E2E; }

    /* ── MAIN ── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 2.5rem 3rem;
      max-width: calc(100% - 240px);
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #111111;
      line-height: 1;
    }
    .page-subtitle { font-size: 0.875rem; color: #7A6E5F; margin-top: 0.3rem; }

    /* FILTROS */
    .filtros {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .filtro-btn {
      padding: 0.45rem 1rem;
      border-radius: 100px;
      border: 1.5px solid rgba(17,17,17,0.15);
      background: transparent;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      color: #7A6E5F;
      transition: all 0.15s;
    }
    .filtro-btn:hover { border-color: #111111; color: #111111; }
    .filtro-btn.active { background: #111111; color: #E8D8B8; border-color: #111111; }

    /* ── PROGRESO ── */
    .quiz-progress {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .progress-bar-bg {
      flex: 1;
      height: 5px;
      background: rgba(17,17,17,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #C41E2E;
      border-radius: 100px;
      transition: width 0.5s ease;
    }
    .progress-text { font-size: 0.8rem; font-weight: 600; color: #7A6E5F; white-space: nowrap; }

    /* ── TARJETA DE ÍTEM ── */
    .item-card {
      background: #E8D8B8;
      border-radius: 12px;
      padding: 2rem;
      max-width: 780px;
      margin-bottom: 1.25rem;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .badge-tipo {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }
    .badge-aplicacion { background: rgba(196,30,46,0.12); color: #C41E2E; }
    .badge-deteccion  { background: rgba(180,100,0,0.12); color: #A05000; }
    .badge-justificacion { background: rgba(30,130,80,0.12); color: #0F6040; }
    .badge-mc         { background: rgba(50,80,180,0.12); color: #283880; }

    .badge-materia {
      font-size: 0.7rem;
      font-weight: 600;
      color: #7A6E5F;
    }

    .item-num {
      margin-left: auto;
      font-size: 0.75rem;
      color: #7A6E5F;
    }

    .caso-box {
      background: #F5EAD4;
      border-left: 3px solid #C41E2E;
      border-radius: 0 8px 8px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #2A2A2A;
    }
    .caso-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C41E2E;
      display: block;
      margin-bottom: 0.4rem;
    }

    .pregunta-text {
      font-size: 1rem;
      font-weight: 600;
      color: #111111;
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }

    /* ── STEP 1: RECALL LIBRE ── */
    .step-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .step-num-badge {
      width: 20px; height: 20px;
      background: #111111;
      color: #E8D8B8;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 0.9rem 1rem;
      border: 1.5px solid rgba(17,17,17,0.15);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      line-height: 1.65;
      background: #F5EAD4;
      color: #111111;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #C41E2E; }
    textarea::placeholder { color: #B0A898; }

    .char-count {
      font-size: 0.72rem;
      color: #7A6E5F;
      text-align: right;
      margin-top: 0.35rem;
    }

    /* ── BOTONES ── */
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #C41E2E; color: #F5EAD4; }
    .btn-primary:hover { background: #E02535; }
    .btn-dark { background: #111111; color: #E8D8B8; }
    .btn-dark:hover { background: #2A2A2A; }
    .btn-outline {
      background: transparent;
      color: #111111;
      border: 1.5px solid rgba(17,17,17,0.2);
    }
    .btn-outline:hover { background: rgba(17,17,17,0.05); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── FEEDBACK DIAGNÓSTICO ── */
    .feedback-panel {
      background: #F5EAD4;
      border-radius: 10px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(17,17,17,0.08);
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .credito-bar-wrap { flex: 1; }
    .credito-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      margin-bottom: 0.35rem;
    }
    .credito-bar-bg {
      height: 8px;
      background: rgba(17,17,17,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .credito-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.6s ease;
    }
    .credito-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      line-height: 1;
      flex-shrink: 0;
    }

    .veredicto {
      font-size: 0.9rem;
      font-weight: 600;
      color: #111111;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 7px;
      background: rgba(17,17,17,0.04);
    }

    .elementos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .elementos-col h4 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .elementos-col.ok h4 { color: #1A7A40; }
    .elementos-col.missing h4 { color: #C41E2E; }

    .elemento-tag {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      font-size: 0.8rem;
      line-height: 1.45;
      margin-bottom: 0.5rem;
      color: #2A2A2A;
    }
    .elemento-tag .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .elementos-col.ok .dot { background: #1A7A40; }
    .elementos-col.missing .dot { background: #C41E2E; }

    .confusion-box {
      background: rgba(196,30,46,0.06);
      border: 1px solid rgba(196,30,46,0.15);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
    }
    .confusion-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C41E2E;
      margin-bottom: 0.3rem;
    }
    .confusion-text { font-size: 0.85rem; color: #2A2A2A; line-height: 1.55; }

    .feedback-diag {
      font-size: 0.875rem;
      color: #3A3A3A;
      line-height: 1.7;
    }

    /* ── MC SECTION ── */
    .mc-section { margin-top: 1.5rem; }
    .mc-intro {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      border: 1.5px solid rgba(17,17,17,0.12);
      background: #F5EAD4;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      color: #111111;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.5;
    }
    .option-btn:hover:not(:disabled) { border-color: #111111; background: #EDE0C8; }
    .option-btn:disabled { cursor: default; }
    .option-btn.selected { border-color: #111111; background: #E0D0B0; }
    .option-btn.correct { background: rgba(34,139,34,0.07); border-color: #228B22; }
    .option-btn.wrong { background: rgba(196,30,46,0.07); border-color: #C41E2E; }
    .option-btn.revealed { background: rgba(34,139,34,0.04); border-color: rgba(34,139,34,0.25); }

    .option-letter {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(17,17,17,0.08);
      font-size: 0.72rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .option-btn.correct .option-letter { background: #228B22; color: white; }
    .option-btn.wrong .option-letter { background: #C41E2E; color: white; }
    .option-btn.revealed .option-letter { background: rgba(34,139,34,0.2); color: #228B22; }

    .justificacion-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #7A6E5F;
      margin-bottom: 0.4rem;
      margin-top: 0.75rem;
    }
    textarea.justificacion {
      min-height: 60px;
      font-size: 0.85rem;
    }

    /* MC feedback distractor */
    .distractor-feedback {
      background: rgba(17,17,17,0.04);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #3A3A3A;
      line-height: 1.6;
    }
    .distractor-feedback strong { color: #111111; }

    /* ── RESPUESTA MODELO ── */
    .modelo-section {
      background: #111111;
      border-radius: 10px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .modelo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #E8D8B8;
      margin-bottom: 1rem;
    }
    .modelo-body {
      font-size: 0.875rem;
      color: rgba(232,216,184,0.8);
      line-height: 1.75;
    }
    .articulos-ref {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .art-tag {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(196,30,46,0.2);
      color: #E8A0A0;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
    }

    /* ── SEGUNDA PASADA ── */
    .segunda-pasada {
      background: rgba(180,120,0,0.08);
      border: 1px solid rgba(180,120,0,0.2);
      border-radius: 10px;
      padding: 1.25rem;
      margin-top: 1.25rem;
    }
    .segunda-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #A06000;
      margin-bottom: 0.4rem;
    }
    .segunda-text {
      font-size: 0.875rem;
      color: #2A2A2A;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    /* ── RESULTADOS ── */
    .results-card {
      background: #E8D8B8;
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 520px;
    }
    .results-emoji { font-size: 3rem; margin-bottom: 1rem; }
    .results-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #111111;
      margin-bottom: 0.4rem;
    }
    .results-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4.5rem;
      letter-spacing: 2px;
      color: #C41E2E;
      line-height: 1;
      margin: 0.75rem 0;
    }
    .results-detail { font-size: 0.9rem; color: #7A6E5F; margin-bottom: 0.5rem; }
    .results-items-detail {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .elementos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      {

        materia: 'civil',
        tema: 'Responsabilidad extracontractual',
        subtema: 'Requisitos / art. 2330',
        tipo: 'aplicacion',

          { texto: 'Rechaza el cúmulo propiamente tal (no se pueden sumar ambas indemnizaciones por el mismo daño)', keywords: ['no acumula', 'no puede sumar', 'mismo daño', 'enriquecimiento injusto', 'rechazado'] },
          { texto: 'Distingue el cúmulo de la opción: puede haber derecho a elegir el estatuto más favorable', keywords: ['opción', 'elegir', 'optar', 'estatuto más favorable'] },
          { texto: 'Señala que la regla general es que, existiendo contrato, se aplica el estatuto contractual', keywords: ['regla general', 'existiendo contrato', 'estatuto contractual', 'hay contrato'] }
        ],

    // ══════════════════════════════════════════════════════════════════
    // ESTADO
    // ══════════════════════════════════════════════════════════════════
    let filtroActivo = 'todos';
    let itemsFiltrados = [];
    let idxActual = 0;
    let fase = 'recall';        // recall | evaluado | mc | mc_evaluado | modelo | segunda_pasada
    let creditoTotal = 0;
    let itemsCompletados = 0;
    let seleccionMC = null;

    // ══════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════
    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'auth.html'; return; }
      const name = user.user_metadata?.full_name || user.email.split('@')[0];
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-avatar').textContent = name[0].toUpperCase();
      startSession();
    }

    function setFiltro(f, btn) {
      filtroActivo = f;
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      idxActual = 0; creditoTotal = 0; itemsCompletados = 0;
      startSession();
    }

    function startSession() {
      // Por ahora el banco se acota a Responsabilidad contractual y extracontractual.
      // (Se ocultan Procesal y otros temas hasta que estén publicados sus manuales.)
      const TEMAS_EN_ALCANCE = [
        'Responsabilidad contractual',
        'Responsabilidad extracontractual',
        'Responsabilidad civil' // ítems comparados: distinción de estatutos, prescripción, cúmulo
      ];
      itemsFiltrados = banco.filter(item => {
        if (!TEMAS_EN_ALCANCE.includes(item.tema)) return false; // fuera Procesal y otros
        if (filtroActivo === 'todos') return true;
        if (filtroActivo === 'contractual') return item.tema === 'Responsabilidad contractual';
        if (filtroActivo === 'extracontractual') return item.tema === 'Responsabilidad extracontractual';
        return item.tipo === filtroActivo; // filtros por tipo de ejercicio
      });
      itemsFiltrados.sort(() => Math.random() - 0.5);
      idxActual = 0;
      renderItem();
    }

    // ══════════════════════════════════════════════════════════════════
    // RENDER ÍTEM
    // ══════════════════════════════════════════════════════════════════
    function renderItem() {
      if (idxActual >= itemsFiltrados.length) { renderResultados(); return; }
      const item = itemsFiltrados[idxActual];
      fase = 'recall';
      seleccionMC = null;

      const pct = Math.round((idxActual / itemsFiltrados.length) * 100);
      const tipoLabel = { aplicacion: 'Aplicación', deteccion_error: 'Detección de error', justificacion: 'Justificación', discriminacion_mc: 'Discriminación' }[item.tipo];
      const tipoCss   = { aplicacion: 'badge-aplicacion', deteccion_error: 'badge-deteccion', justificacion: 'badge-justificacion', discriminacion_mc: 'badge-mc' }[item.tipo];
      const instruccion = {
        aplicacion: 'Escribe tu análisis completo antes de ver cualquier opción.',
        deteccion_error: 'Identifica y explica cada error que encuentres.',
        justificacion: 'Explica el fundamento. Sé preciso en artículos y consecuencias.',
        discriminacion_mc: 'Primero escribe lo que recuerdas. Luego verás las opciones.'
      }[item.tipo];

      document.getElementById('quiz-container').innerHTML = `
        <div class="quiz-progress">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span class="progress-text">${idxActual + 1} / ${itemsFiltrados.length}</span>
        </div>

        <div class="item-card">
          <div class="item-meta">
            <span class="badge-tipo ${tipoCss}">${tipoLabel}</span>
            <span class="badge-materia">${item.tema} · ${item.subtema}</span>
            <span class="item-num">${item.id}</span>
          </div>

          ${item.caso ? `
            <div class="caso-box">
              <span class="caso-label">Caso</span>
              ${item.caso}
            </div>
          ` : ''}

          <div class="pregunta-text">${item.enunciado}</div>

          <div class="step-label">
            <div class="step-num-badge">1</div>
            Recuperación libre — ${instruccion}
          </div>
          <textarea id="recall-text" placeholder="Escribe aquí tu respuesta desde cero…" oninput="updateChar()"></textarea>
          <div class="char-count"><span id="char-count">0</span> caracteres</div>

          <div class="btn-row">
            <button class="btn btn-primary" id="btn-evaluar" onclick="evaluarRespuesta()">Evaluar mi respuesta</button>
            <button class="btn btn-outline" onclick="skipItem()">Saltar ítem</button>
          </div>

          <div id="feedback-area"></div>
        </div>
      `;
    }

    function updateChar() {
      const txt = document.getElementById('recall-text');
      document.getElementById('char-count').textContent = txt.value.length;
    }

    // ══════════════════════════════════════════════════════════════════
    // EVALUACIÓN (rubric-based, sin IA por ahora)
    // ══════════════════════════════════════════════════════════════════
    function evaluarRespuesta(esSegundaPasada = false) {
      const item = itemsFiltrados[idxActual];
      const texto = (document.getElementById('recall-text')?.value || '').toLowerCase();

      if (texto.trim().length < 30) {
        document.getElementById('recall-text').style.borderColor = '#C41E2E';
        setTimeout(() => document.getElementById('recall-text').style.borderColor = '', 1500);
        return;
      }

      document.getElementById('btn-evaluar').disabled = true;

      // Los ítems de discriminación (alternativas) no tienen rúbrica de palabras
      // clave: la recuperación libre es solo práctica y la corrección real ocurre
      // al elegir la alternativa. Sin esta guarda, item.elementos_clave.forEach
      // lanzaba un TypeError y no se mostraba ningún feedback.
      if (!item.elementos_clave || item.elementos_clave.length === 0) {
        const cont = item.tipo === 'discriminacion_mc'
          ? `<button class="btn btn-dark" onclick="mostrarMC()">Continuar → Alternativas</button>`
          : `<button class="btn btn-dark" onclick="mostrarModelo()">Ver respuesta modelo</button>`;
        document.getElementById('feedback-area').innerHTML = `
          <div class="feedback-panel">
            <div class="veredicto">✓ Recuperación registrada. Ahora contrasta tu recuerdo con las alternativas y elige la correcta.</div>
            <div class="btn-row" style="margin-top:1.25rem;">${cont}</div>
          </div>`;
        document.getElementById('feedback-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }

      const acertados = [];
      const faltantes = [];

      item.elementos_clave.forEach(el => {
        const found = el.keywords.some(kw => texto.includes(kw.toLowerCase()));
        if (found) acertados.push(el.texto);
        else faltantes.push(el.texto);
      });

      const credito = acertados.length / item.elementos_clave.length;
      const pct = Math.round(credito * 100);
      const color = credito >= 0.75 ? '#1A7A40' : credito >= 0.4 ? '#A06000' : '#C41E2E';

      let siguiente;
      if (credito >= 0.75) siguiente = 'avanzar';
      else if (credito >= 0.35 && !esSegundaPasada) siguiente = 'segunda_pasada';
      else siguiente = 'ver_modelo';

      let veredicto, feedbackDiag;
      if (credito >= 0.75) {
        veredicto = '✓ Respuesta sólida. Cubriste los elementos esenciales.';
        feedbackDiag = faltantes.length > 0 ? `Estuviste muy bien. Para completar, considera también: ${faltantes.join('; ')}.` : 'Respuesta completa.';
      } else if (credito >= 0.35) {
        veredicto = '◐ Respuesta parcial. Captaste la idea general pero faltaron elementos clave.';
        feedbackDiag = `Identificaste correctamente ${acertados.length} de ${item.elementos_clave.length} elementos. Lo que faltó es precisamente lo que más se pregunta en el examen. ${esSegundaPasada ? 'Revisa el modelo abajo.' : 'Tienes una segunda pasada.'}`;
      } else {
        veredicto = '✗ Respuesta insuficiente. Hay que trabajar este punto.';
        feedbackDiag = `Solo cubriste ${acertados.length} de ${item.elementos_clave.length} elementos. Revisa el manual de ${item.tema} antes de continuar.`;
      }

      creditoTotal += credito;
      itemsCompletados++;

      const feedbackHTML = `
        <div class="feedback-panel">
          <div class="feedback-header">
            <div class="credito-bar-wrap">
              <div class="credito-label">Crédito parcial</div>
              <div class="credito-bar-bg">
                <div class="credito-bar-fill" style="width:${pct}%; background:${color}"></div>
              </div>
            </div>
            <div class="credito-pct" style="color:${color}">${pct}%</div>
          </div>

          <div class="veredicto">${veredicto}</div>

          <div class="elementos-grid">
            <div class="elementos-col ok">
              <h4>✓ Presentes</h4>
              ${acertados.length > 0
                ? acertados.map(e => `<div class="elemento-tag"><div class="dot"></div><span>${e}</span></div>`).join('')
                : '<div class="elemento-tag" style="color:#7A6E5F; font-style:italic">Ninguno detectado</div>'
              }
            </div>
            <div class="elementos-col missing">
              <h4>✗ Faltaron</h4>
              ${faltantes.length > 0
                ? faltantes.map(e => `<div class="elemento-tag"><div class="dot"></div><span>${e}</span></div>`).join('')
                : '<div class="elemento-tag" style="color:#1A7A40; font-style:italic">Todo cubierto</div>'
              }
            </div>
          </div>

          <div class="feedback-diag">${feedbackDiag}</div>

          ${siguiente === 'segunda_pasada' ? `
            <div class="segunda-pasada" style="margin-top:1.25rem;">
              <div class="segunda-title">Segunda pasada</div>
              <div class="segunda-text">
                Estuviste cerca. No te doy la respuesta todavía: tienes una oportunidad más.
                Foco en lo que faltó: <strong>${faltantes.slice(0,2).join(' / ')}</strong>.
              </div>
              <textarea id="recall-text-2" style="min-height:90px;" placeholder="Complementa o reescribe tu respuesta…"></textarea>
              <div class="btn-row" style="margin-top:0.75rem;">
                <button class="btn btn-primary" onclick="evaluarSegundaPasada()">Evaluar segunda pasada</button>
                <button class="btn btn-outline" onclick="mostrarModelo()">Ver respuesta modelo</button>
              </div>
            </div>
          ` : `
            <div class="btn-row" style="margin-top:1.25rem;">
              ${item.tipo === 'discriminacion_mc'
                ? `<button class="btn btn-dark" onclick="mostrarMC()">Continuar → Alternativa de discriminación</button>`
                : `<button class="btn btn-dark" onclick="mostrarModelo()">Ver respuesta modelo</button>`
              }
            </div>
          `}
        </div>
      `;

      document.getElementById('feedback-area').innerHTML = feedbackHTML;
      document.getElementById('feedback-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function evaluarSegundaPasada() {
      const txt2 = document.getElementById('recall-text-2')?.value || '';
      const txt1 = document.getElementById('recall-text')?.value || '';
      const combinado = txt1 + ' ' + txt2;
      // Reemplazar texto para evaluación combinada
      const fakeInput = document.createElement('textarea');
      fakeInput.id = 'recall-text';
      fakeInput.value = combinado;
      document.getElementById('recall-text').replaceWith(fakeInput);
      evaluarRespuesta(true);
    }

    // ══════════════════════════════════════════════════════════════════
    // MC
    // ══════════════════════════════════════════════════════════════════
    function mostrarMC() {
      const item = itemsFiltrados[idxActual];
      const letras = ['A', 'B', 'C', 'D'];

      const mcHTML = `
        <div class="mc-section">
          <div class="step-label">
            <div class="step-num-badge">2</div>
            Discriminación — Selecciona la opción correcta y justifica en una línea.
          </div>
          <div class="mc-intro">Ahora que ya escribiste tu análisis, elige la alternativa que corresponde.</div>
          <div class="options-grid" id="mc-options">
            ${item.opciones.map((op, i) => `
              <button class="option-btn" id="mc-opt-${i}" onclick="selectMC(${i})">
                <span class="option-letter">${letras[i]}</span>
                <span>${op.texto}</span>
              </button>
            `).join('')}
          </div>
          <div class="justificacion-label">Justificación (1 línea) — ¿Por qué elegiste esa opción?</div>
          <textarea id="justificacion-text" class="justificacion" placeholder="Elijo X porque…"></textarea>
          <div class="btn-row">
            <button class="btn btn-primary" id="btn-confirmar-mc" onclick="evaluarMC()">Confirmar selección</button>
          </div>
          <div id="mc-feedback"></div>
        </div>
      `;

      document.getElementById('feedback-area').insertAdjacentHTML('beforeend', mcHTML);
      document.getElementById('mc-options').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function selectMC(idx) {
      seleccionMC = idx;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('mc-opt-' + idx).classList.add('selected');
    }

    function evaluarMC() {
      const item = itemsFiltrados[idxActual];
      if (seleccionMC === null) return;

      const btnConfirmar = document.getElementById('btn-confirmar-mc');
      if (btnConfirmar) {
        if (btnConfirmar.disabled) return; // evita doble conteo si se reconfirma
        btnConfirmar.disabled = true;
      }

      const letras = ['A', 'B', 'C', 'D'];
      const correctaIdx = item.opciones.findIndex(op => op.letra === item.correcta);
      const esCorrecta = seleccionMC === correctaIdx;

      // Estos ítems no pasan por la rúbrica de recuperación libre; su crédito se
      // contabiliza aquí (acierto = 1, error = 0) para que sí cuenten en el puntaje.
      creditoTotal += esCorrecta ? 1 : 0;
      itemsCompletados++;

      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === correctaIdx) btn.classList.add(esCorrecta && i === seleccionMC ? 'correct' : 'revealed');
      });

      if (!esCorrecta) {
        document.getElementById('mc-opt-' + seleccionMC).classList.remove('revealed');
        document.getElementById('mc-opt-' + seleccionMC).classList.add('wrong');
      }

      const opcionElegida = item.opciones[seleccionMC];
      const distractorFeedback = esCorrecta
        ? `<strong>Correcto.</strong> ${item.opciones[correctaIdx].rationale}`
        : `<strong>Incorrecto.</strong> Elegiste ${letras[seleccionMC]}: ${opcionElegida.rationale}. La correcta es ${item.correcta}: ${item.opciones[correctaIdx].rationale}`;

      document.getElementById('mc-feedback').innerHTML = `
        <div class="distractor-feedback">${distractorFeedback}</div>
        <div class="btn-row" style="margin-top:1rem;">
          <button class="btn btn-dark" onclick="siguiente()">
            ${idxActual < itemsFiltrados.length - 1 ? 'Siguiente ítem →' : 'Ver resultados →'}
          </button>
        </div>
      `;
    }

    // ══════════════════════════════════════════════════════════════════
    // MODELO
    // ══════════════════════════════════════════════════════════════════
    function mostrarModelo() {
      const item = itemsFiltrados[idxActual];
      const modeloHTML = `
        <div class="modelo-section">
          <div class="modelo-title">Respuesta orientadora</div>
          <div class="modelo-body">${item.respuesta_modelo || 'La corrección de este ítem se realiza al elegir la alternativa correcta.'}</div>
          <div class="articulos-ref">
            ${(item.articulos_referencia || []).map(a => `<span class="art-tag">Art. ${a}</span>`).join('')}
          </div>
        </div>
        <div class="btn-row" style="margin-top:1.5rem; max-width:780px;">
          <button class="btn btn-dark" onclick="siguiente()">
            ${idxActual < itemsFiltrados.length - 1 ? 'Siguiente ítem →' : 'Ver resultados →'}
          </button>
        </div>
      `;
      document.getElementById('feedback-area').insertAdjacentHTML('beforeend', modeloHTML);
      document.querySelector('.modelo-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function skipItem() {
      itemsCompletados++;
      siguiente();
    }

    function siguiente() {
      idxActual++;
      renderItem();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ══════════════════════════════════════════════════════════════════
    // RESULTADOS
    // ══════════════════════════════════════════════════════════════════
    function renderResultados() {
      const pct = itemsCompletados > 0 ? Math.round((creditoTotal / itemsCompletados) * 100) : 0;
      const emoji = pct >= 75 ? '🏆' : pct >= 50 ? '💪' : '📚';
      const msg = pct >= 75 ? '¡Buen dominio!' : pct >= 50 ? 'Vas por buen camino' : 'Hay que trabajar más';

      document.getElementById('quiz-container').innerHTML = `
        <div class="results-card">
          <div class="results-emoji">${emoji}</div>
          <div class="results-title">${msg}</div>
          <div class="results-score">${pct}%</div>
          <div class="results-detail">Crédito promedio sobre ${itemsCompletados} ítems completados</div>
          <div class="results-items-detail">
            Aplicación y casos · Detección de error · Justificación · Discriminación
          </div>
          <button class="btn btn-primary" onclick="startSession()" style="margin-right:.5rem;">Nueva sesión</button>
          <a href="manuales.html" class="btn btn-outline" style="display:inline-block; margin-top:.5rem;">Repasar manuales</a>
        </div>
      `;
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '../index.html';
    }

    init();
  </script>

</body>
</html>
