<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digesto — Práctica</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5EAD4;
      color: #111111;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #E8D8B8;
      margin-bottom: 3rem;
      text-decoration: none;
    }
    .sidebar-logo span { color: #C41E2E; }
    .nav-section {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,216,184,0.3);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 7px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(232,216,184,0.55);
      transition: all 0.15s;
      margin-bottom: 0.2rem;
    }
    .nav-item:hover { background: rgba(232,216,184,0.06); color: #E8D8B8; }
    .nav-item.active { background: rgba(196,30,46,0.15); color: #E8D8B8; }
    .nav-item.active .nav-icon { color: #C41E2E; }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      font-size: 0.65rem;
      background: rgba(196,30,46,0.2);
      color: #C41E2E;
      padding: 0.1rem 0.45rem;
      border-radius: 100px;
      font-weight: 600;
    }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(232,216,184,0.08);
    }
    .user-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .user-avatar {
      width: 36px; height: 36px;
      background: #C41E2E;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #F5EAD4;
      flex-shrink: 0;
    }
    .user-name { font-size: 0.82rem; font-weight: 600; color: #E8D8B8; }
    .user-plan { font-size: 0.72rem; color: rgba(232,216,184,0.4); }
    .btn-logout {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px solid rgba(232,216,184,0.12);
      border-radius: 6px;
      color: rgba(232,216,184,0.4);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: rgba(196,30,46,0.3); color: #C41E2E; }

    /* ── MAIN ── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 2.5rem 3rem;
      max-width: calc(100% - 240px);
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #111111;
      line-height: 1;
    }
    .page-subtitle { font-size: 0.875rem; color: #7A6E5F; margin-top: 0.3rem; }

    /* FILTROS — tres ejes: Materia / Modelo / Subtipo */
    .ejes-filtros { margin-bottom: 1.75rem; }
    .eje-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .eje-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      width: 82px;
      flex-shrink: 0;
    }
    .filtro-btn {
      padding: 0.45rem 1rem;
      border-radius: 100px;
      border: 1.5px solid rgba(17,17,17,0.15);
      background: transparent;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      color: #7A6E5F;
      transition: all 0.15s;
    }
    .filtro-btn:hover { border-color: #111111; color: #111111; }
    .filtro-btn.active { background: #111111; color: #E8D8B8; border-color: #111111; }
    .eje-row.subtipo .filtro-btn.active { background: #C41E2E; border-color: #C41E2E; }
    .filtro-btn.disabled { cursor: default; opacity: 0.4; border-style: dashed; }
    .filtro-btn.disabled:hover { border-color: rgba(17,17,17,0.15); color: #7A6E5F; }

    /* ── PROGRESO ── */
    .quiz-progress {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .progress-bar-bg {
      flex: 1;
      height: 5px;
      background: rgba(17,17,17,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #C41E2E;
      border-radius: 100px;
      transition: width 0.5s ease;
    }
    .progress-text { font-size: 0.8rem; font-weight: 600; color: #7A6E5F; white-space: nowrap; }

    /* ── TARJETA DE ÍTEM (Evaluación / Alternativas / Memorice) ── */
    .item-card {
      background: #E8D8B8;
      border-radius: 12px;
      padding: 2rem;
      max-width: 780px;
      margin-bottom: 1.25rem;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .badge-tipo {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }
    .badge-aplicacion { background: rgba(196,30,46,0.12); color: #C41E2E; }
    .badge-deteccion  { background: rgba(180,100,0,0.12); color: #A05000; }
    .badge-justificacion { background: rgba(30,130,80,0.12); color: #0F6040; }
    .badge-mc         { background: rgba(50,80,180,0.12); color: #283880; }
    .badge-memorice   { background: rgba(120,60,170,0.12); color: #5A2E8C; }

    .badge-materia {
      font-size: 0.7rem;
      font-weight: 600;
      color: #7A6E5F;
    }

    .item-num {
      margin-left: auto;
      font-size: 0.75rem;
      color: #7A6E5F;
    }

    .caso-box {
      background: #F5EAD4;
      border-left: 3px solid #C41E2E;
      border-radius: 0 8px 8px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #2A2A2A;
    }
    .caso-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C41E2E;
      display: block;
      margin-bottom: 0.4rem;
    }

    .pregunta-text {
      font-size: 1rem;
      font-weight: 600;
      color: #111111;
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }

    /* ── STEP 1: RECALL LIBRE (Evaluación) ── */
    .step-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .step-num-badge {
      width: 20px; height: 20px;
      background: #111111;
      color: #E8D8B8;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 0.9rem 1rem;
      border: 1.5px solid rgba(17,17,17,0.15);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      line-height: 1.65;
      background: #F5EAD4;
      color: #111111;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #C41E2E; }
    textarea::placeholder { color: #B0A898; }

    .char-count {
      font-size: 0.72rem;
      color: #7A6E5F;
      text-align: right;
      margin-top: 0.35rem;
    }

    /* ── BOTONES ── */
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #C41E2E; color: #F5EAD4; }
    .btn-primary:hover { background: #E02535; }
    .btn-dark { background: #111111; color: #E8D8B8; }
    .btn-dark:hover { background: #2A2A2A; }
    .btn-outline {
      background: transparent;
      color: #111111;
      border: 1.5px solid rgba(17,17,17,0.2);
    }
    .btn-outline:hover { background: rgba(17,17,17,0.05); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── FEEDBACK DIAGNÓSTICO (Evaluación) ── */
    .feedback-panel {
      background: #F5EAD4;
      border-radius: 10px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(17,17,17,0.08);
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .credito-bar-wrap { flex: 1; }
    .credito-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      margin-bottom: 0.35rem;
    }
    .credito-bar-bg {
      height: 8px;
      background: rgba(17,17,17,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .credito-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.6s ease;
    }
    .credito-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      line-height: 1;
      flex-shrink: 0;
    }

    .veredicto {
      font-size: 0.9rem;
      font-weight: 600;
      color: #111111;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 7px;
      background: rgba(17,17,17,0.04);
    }

    .elementos-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .elementos-col h4 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .elementos-col.ok h4 { color: #1A7A40; }

    .elemento-tag {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      font-size: 0.8rem;
      line-height: 1.45;
      margin-bottom: 0.5rem;
      color: #2A2A2A;
    }
    .elemento-tag .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .elementos-col.ok .dot { background: #1A7A40; }

    .confusion-box {
      background: rgba(196,30,46,0.06);
      border: 1px solid rgba(196,30,46,0.15);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
    }
    .confusion-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C41E2E;
      margin-bottom: 0.3rem;
    }
    .confusion-text { font-size: 0.85rem; color: #2A2A2A; line-height: 1.55; }

    .feedback-diag {
      font-size: 0.875rem;
      color: #3A3A3A;
      line-height: 1.7;
    }

    /* ── MC SECTION (compartida: discriminación dentro de Evaluación, y modelo Alternativas) ── */
    .mc-section { margin-top: 1.5rem; }
    .mc-intro {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      border: 1.5px solid rgba(17,17,17,0.12);
      background: #F5EAD4;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      color: #111111;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.5;
    }
    .option-btn:hover:not(:disabled) { border-color: #111111; background: #EDE0C8; }
    .option-btn:disabled { cursor: default; }
    .option-btn.selected { border-color: #111111; background: #E0D0B0; }
    .option-btn.correct { background: rgba(34,139,34,0.07); border-color: #228B22; }
    .option-btn.wrong { background: rgba(196,30,46,0.07); border-color: #C41E2E; }
    .option-btn.revealed { background: rgba(34,139,34,0.04); border-color: rgba(34,139,34,0.25); }

    .option-letter {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(17,17,17,0.08);
      font-size: 0.72rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .option-btn.correct .option-letter { background: #228B22; color: white; }
    .option-btn.wrong .option-letter { background: #C41E2E; color: white; }
    .option-btn.revealed .option-letter { background: rgba(34,139,34,0.2); color: #228B22; }

    .justificacion-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #7A6E5F;
      margin-bottom: 0.4rem;
      margin-top: 0.75rem;
    }
    textarea.justificacion {
      min-height: 60px;
      font-size: 0.85rem;
    }

    .distractor-feedback {
      background: rgba(17,17,17,0.04);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #3A3A3A;
      line-height: 1.6;
    }
    .distractor-feedback strong { color: #111111; }

    /* ── RESPUESTA MODELO ── */
    .modelo-section {
      background: #111111;
      border-radius: 10px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .modelo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #E8D8B8;
      margin-bottom: 1rem;
    }
    .modelo-body {
      font-size: 0.875rem;
      color: rgba(232,216,184,0.8);
      line-height: 1.75;
    }
    .articulos-ref {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .art-tag {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(196,30,46,0.2);
      color: #E8A0A0;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
    }

    /* ── SEGUNDA PASADA ── */
    .segunda-pasada {
      background: rgba(180,120,0,0.08);
      border: 1px solid rgba(180,120,0,0.2);
      border-radius: 10px;
      padding: 1.25rem;
      margin-top: 1.25rem;
    }
    .segunda-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #A06000;
      margin-bottom: 0.4rem;
    }
    .segunda-text {
      font-size: 0.875rem;
      color: #2A2A2A;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    /* ── RESULTADOS ── */
    .results-card {
      background: #E8D8B8;
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 520px;
    }
    .results-emoji { font-size: 3rem; margin-bottom: 1rem; }
    .results-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #111111;
      margin-bottom: 0.4rem;
    }
    .results-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4.5rem;
      letter-spacing: 2px;
      color: #C41E2E;
      line-height: 1;
      margin: 0.75rem 0;
    }
    .results-detail { font-size: 0.9rem; color: #7A6E5F; margin-bottom: 0.5rem; }
    .results-items-detail {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .estado-vacio {
      text-align: center;
      padding: 3rem 1rem;
      color: #7A6E5F;
      font-size: 0.9rem;
    }
    .spinner {
      width: 26px; height: 26px;
      margin: 0 auto 1rem;
      border: 3px solid rgba(17,17,17,0.1); border-top-color: #C41E2E;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FLASHCARDS (modelo) ── */
    .fc-tarjeta {
      background: #FFFFFF;
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 16px;
      min-height: 260px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      max-width: 720px;
    }
    .fc-dificultad {
      position: absolute; top: 1rem; left: 1rem;
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem; border-radius: 100px;
    }
    .fc-dificultad.basica { background: rgba(26,122,64,0.1); color: #1A7A40; }
    .fc-dificultad.intermedia { background: rgba(196,146,30,0.12); color: #8A6300; }
    .fc-dificultad.avanzada { background: rgba(196,30,46,0.1); color: #A61825; }
    .fc-tema { position: absolute; top: 1rem; right: 1rem; font-size: 0.7rem; color: rgba(17,17,17,0.35); max-width: 55%; text-align: right; }
    .fc-etiqueta { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(17,17,17,0.3); margin-bottom: 0.9rem; }
    .fc-texto { font-size: 1.05rem; line-height: 1.6; color: #111111; }
    .fc-texto b { color: #A61825; }
    .fc-texto .art { font-family: 'SF Mono', Menlo, monospace; font-size: 0.92em; background: rgba(17,17,17,0.06); color: #4A4136; padding: 0.1rem 0.4rem; border-radius: 4px; }
    .fc-pista { margin-top: 1.5rem; font-size: 0.75rem; color: rgba(17,17,17,0.3); }
    .fc-controles { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
    .fc-calificar-fila { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
    .btn-calificar { padding: 0.6rem 1rem; border-radius: 8px; border: 1.5px solid; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; background: #FFFFFF; transition: opacity 0.15s; }
    .btn-calificar:hover { opacity: 0.85; }
    .btn-calificar.bien { border-color: #1A7A40; color: #1A7A40; }
    .btn-calificar.mas_o_menos { border-color: #8A6300; color: #8A6300; }
    .btn-calificar.poco { border-color: #A61825; color: #A61825; }
    .fc-barajar { background: none; border: none; color: #7A6E5F; font-family: 'Inter', sans-serif; font-size: 0.78rem; cursor: pointer; text-decoration: underline; margin-top: 1rem; display: block; }

    /* ── MEMORICE (modelo) ── */
    .mem-fuente { font-size: 0.75rem; color: #7A6E5F; margin-bottom: 1rem; }
    .mem-articulo-texto {
      font-size: 1.05rem;
      line-height: 2.6;
      color: #111111;
      margin-bottom: 1.5rem;
    }
    .mem-clave-texto {
      font-family: 'SF Mono', Menlo, monospace;

    // ══════════════════════════════════════════════════════════════════
    // MOTOR DE MEMORICE (ocultamiento progresivo + corrección por palabra)
    // ══════════════════════════════════════════════════════════════════
    const ARTICULOS_TOLERADOS = ['el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas'];
    const GRUPOS_EQUIVALENTES = [['por', 'en'], ['de', 'del'], ['a', 'al']];
    const PALABRAS_FUNCIONALES = new Set([
      'el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas',
      'de', 'del', 'en', 'por', 'para', 'con', 'a', 'al', 'sin', 'sobre', 'entre', 'hacia', 'hasta', 'desde',
      'y', 'o', 'u', 'ni', 'que', 'como', 'pero', 'si', 'se', 'su', 'sus', 'lo', 'le', 'les',
      'es', 'son', 'ha', 'han', 'sea', 'sean',
    ]);

    // "un/una/uno" quedan afuera a propósito: son casi siempre el artículo
    // ("una declaración"), no el número, y confundirlos sería peor que el
    // problema que se quiere resolver. Los demás números casi no se usan
    // como otra cosa en un texto legal, así que "cinco" y "5" se tratan
    // como la misma respuesta (es la misma norma, solo cambia cómo se
    // escribió el número — no debería marcarse como error).
    const NUMEROS_A_DIGITO = {
      dos: '2', tres: '3', cuatro: '4', cinco: '5', seis: '6', siete: '7', ocho: '8', nueve: '9', diez: '10',
      once: '11', doce: '12', trece: '13', catorce: '14', quince: '15',
      dieciseis: '16', diecisiete: '17', dieciocho: '18', diecinueve: '19', veinte: '20',
      treinta: '30', cuarenta: '40', cincuenta: '50', sesenta: '60', setenta: '70', ochenta: '80', noventa: '90',
      cien: '100', ciento: '100', mil: '1000',
    };

    function normalizarPalabra(w) {
      const limpia = w.trim().toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[.,;:!?¿¡"'«»()\[\]]/g, '');
      return NUMEROS_A_DIGITO[limpia] || limpia;
    }
    function tokenizar(texto) { return texto.trim().split(/\s+/).filter(Boolean); }
    function mismoGrupoFuncional(a, b) { return a === b || GRUPOS_EQUIVALENTES.some(g => g.includes(a) && g.includes(b)); }
    function esCritica(palabraNorm, criticasNorm) { return criticasNorm.has(palabraNorm); }
    function palabrasEquivalentes(esperada, escrita, criticasNorm) {
      if (esCritica(esperada, criticasNorm)) return esperada === escrita;
      return esperada === escrita || mismoGrupoFuncional(esperada, escrita);
    }

    function compararBlank(esperadoTexto, escritoTexto, palabrasCriticas) {
      const criticasNorm = new Set((palabrasCriticas || []).map(normalizarPalabra));
      const esperadas = tokenizar(esperadoTexto).map(normalizarPalabra);
      const escritas = tokenizar(escritoTexto).map(normalizarPalabra);
      const esperadasF = esperadas.filter(p => !(ARTICULOS_TOLERADOS.includes(p) && !esCritica(p, criticasNorm)));
      const escritasF = escritas.filter(p => !ARTICULOS_TOLERADOS.includes(p) || esCritica(p, criticasNorm));
      if (esperadasF.length !== escritasF.length) return { correcto: false };
      for (let i = 0; i < esperadasF.length; i++) {
        if (!palabrasEquivalentes(esperadasF[i], escritasF[i], criticasNorm)) return { correcto: false };
      }
      return { correcto: true };
    }

    function diffCompleto(textoEsperado, textoEscrito, palabrasCriticas) {
      const criticasNorm = new Set((palabrasCriticas || []).map(normalizarPalabra));
      const esperadasOriginal = tokenizar(textoEsperado);
      const escritasOriginal = tokenizar(textoEscrito);
      const esperadas = esperadasOriginal.map(normalizarPalabra);
      const escritas = escritasOriginal.map(normalizarPalabra);
      const n = esperadas.length, m = escritas.length;
      const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
      for (let i = n - 1; i >= 0; i--) {
        for (let j = m - 1; j >= 0; j--) {
          dp[i][j] = palabrasEquivalentes(esperadas[i], escritas[j], criticasNorm)
            ? dp[i + 1][j + 1] + 1
            : Math.max(dp[i + 1][j], dp[i][j + 1]);
        }
      }
      const items = [];
      let i = 0, j = 0, ok = 0, huboError = false;
      while (i < n && j < m) {
        if (palabrasEquivalentes(esperadas[i], escritas[j], criticasNorm)) {
          items.push({ tipo: 'ok', palabra: esperadasOriginal[i] }); ok++; i++; j++;
        } else if (dp[i + 1][j] >= dp[i][j + 1]) {
          items.push({ tipo: 'falta', palabra: esperadasOriginal[i], critica: esCritica(esperadas[i], criticasNorm) });
          huboError = true; i++;
        } else {
          items.push({ tipo: 'sobra', palabra: escritasOriginal[j] });
          huboError = true; j++;
        }
      }
      while (i < n) { items.push({ tipo: 'falta', palabra: esperadasOriginal[i], critica: esCritica(esperadas[i], criticasNorm) }); huboError = true; i++; }
      while (j < m) { items.push({ tipo: 'sobra', palabra: escritasOriginal[j] }); huboError = true; j++; }
      return { items, correcto: !huboError, totalEsperadas: n, okCount: ok };
    }

    function gruposAutomaticos(texto) {
      const palabras = tokenizar(texto);
      const semanticas = palabras
        .map((p, idx) => ({ idx, palabra: p, norm: normalizarPalabra(p) }))
        .filter(p => !PALABRAS_FUNCIONALES.has(p.norm) && p.norm.length > 0);
      const ordenadas = [...semanticas].sort((a, b) => b.norm.length - a.norm.length || a.idx - b.idx);
      const total = ordenadas.length;
      // N1=30% oculto, N2=60% acumulado, N3=90% acumulado. N4 no usa grupos:
      // es una sola caja de texto libre, sin ninguna pista de estructura
      // (ver construirBlanks).
      const corte = [Math.ceil(total * 0.3), Math.ceil(total * 0.6), Math.ceil(total * 0.9), total];
      const grupos = [[], [], [], []];
      ordenadas.forEach((p, i) => {
        if (i < corte[0]) grupos[0].push(p.palabra);
        else if (i < corte[1]) grupos[1].push(p.palabra);
        else if (i < corte[2]) grupos[2].push(p.palabra);
        else grupos[3].push(p.palabra);
      });
      return grupos;
    }

    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    // Marcador con caracteres del área de uso privado Unicode (nunca aparecen
    // en texto legal real) para no confundirse con números literales del
    // artículo (ej. "plazo de 10 días"), y coincidencia con límite de palabra
    // (vía \p{L}, no \w, porque \w no reconoce tildes/ñ) para no matchear un
    // span corto dentro de una palabra más larga que lo contiene.
    function construirBlanks(articulo, nivel) {
      if (nivel >= 4) return { partes: [{ tipo: 'blank_total', esperado: articulo.texto }] };
      const curado = !!(articulo.prioridad_ocultamiento && articulo.prioridad_ocultamiento.length > 0);
      const grupos = curado ? articulo.prioridad_ocultamiento : gruposAutomaticos(articulo.texto);
      const ocultarSpans = [];
      for (let g = 0; g < nivel && g < grupos.length; g++) {
        for (const span of grupos[g]) { if (span !== '*') ocultarSpans.push(span); }
      }
      ocultarSpans.sort((a, b) => b.length - a.length);

      const ABRE = '', CIERRA = '';
      let texto = articulo.texto;
      const encontrados = [];
      ocultarSpans.forEach((span) => {
        const patron = new RegExp(`(?<![\\p{L}\\p{N}])${escapeRegExp(span)}(?![\\p{L}\\p{N}])`, 'u');
        const m = texto.match(patron);
        if (!m) return;
        const pos = m.index;
        texto = texto.slice(0, pos) + ABRE + encontrados.length + CIERRA + texto.slice(pos + span.length);
        encontrados.push(span);
      });

      const partes = [];
      const regex = new RegExp(`${ABRE}(\\d+)${CIERRA}`, 'g');
      let ultimo = 0, m;
      while ((m = regex.exec(texto)) !== null) {
        if (m.index > ultimo) partes.push({ tipo: 'texto', texto: texto.slice(ultimo, m.index) });
        partes.push({ tipo: 'blank', esperado: encontrados[Number(m[1])] });
        ultimo = m.index + m[0].length;
      }
      if (ultimo < texto.length) partes.push({ tipo: 'texto', texto: texto.slice(ultimo) });
      return { partes };
    }

    // ══════════════════════════════════════════════════════════════════
    // NORMALIZACIÓN DE MATERIA (tolera distintos formatos ya guardados)
    // ══════════════════════════════════════════════════════════════════
    function normalizarMateria(raw) {
      if (!raw) return 'general';
      const s = raw.toLowerCase();
      if (s.includes('precontractual')) return 'precontractual';
      if (s.includes('extracontractual')) return 'extracontractual';
      if (s.includes('contractual')) return 'contractual';
      if (s.includes('procesal')) return 'procesal';
      return 'general';
    }
    function escaparHtmlBase(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function sumarDias(dias) { return new Date(Date.now() + dias * 24 * 60 * 60 * 1000).toISOString(); }

    // ══════════════════════════════════════════════════════════════════
    // ESTADO DE FILTROS (Eje 1 Materia · Eje 2 Modelo · Eje 3 Subtipo)
    // ══════════════════════════════════════════════════════════════════
    let ramaActiva = 'civil';
    let materiaActiva = 'todas'; // materia dentro de Civil (Responsabilidad, Bienes, etc.)
    let areaActiva = 'todas'; // dentro de Responsabilidad: precontractual/contractual/extracontractual
    let modeloActivo = 'evaluacion';
    let subtipoActivo = 'todos';

    // Contenido cargado desde Supabase (Alternativas, Memorice, Flashcards)
    let datosAlternativas = [];
    let datosMemoriceArticulos = [];
    let progresoMemorice = {}; // articulo_id -> {nivel_actual, proxima_revision, historial}
    let datosFlashcards = [];
    let progresoFlashcards = {}; // flashcard_id -> {calificacion, proxima_revision}

    const TEMAS_EN_ALCANCE = [
      'Responsabilidad contractual',
      'Responsabilidad extracontractual',
      'Responsabilidad civil'
    ];

    const MODELOS = [
      { id: 'evaluacion', label: 'Evaluación' },
      { id: 'flashcard', label: 'Flashcards' },
      { id: 'alternativa', label: 'Alternativas' },
      { id: 'memorice', label: 'Memorice' },
    ];
    const RAMAS = [
      { id: 'civil', label: 'Civil' },
      { id: 'procesal', label: 'Procesal', disabled: true },
    ];
    const MATERIAS_CIVIL = [
      { id: 'todas', label: 'Todas' },
      { id: 'responsabilidad', label: 'Responsabilidad' },
      { id: 'acto_juridico', label: 'Acto Jurídico', disabled: true },
      { id: 'bienes', label: 'Bienes', disabled: true },
      { id: 'obligaciones', label: 'Obligaciones', disabled: true },
      { id: 'contratos', label: 'Contratos', disabled: true },
      { id: 'familia', label: 'Familia', disabled: true },
      { id: 'sucesorio', label: 'Sucesorio', disabled: true },
    ];
    const AREAS_RESPONSABILIDAD = [
      { id: 'todas', label: 'Todas' },
      { id: 'precontractual', label: 'Precontractual' },
      { id: 'contractual', label: 'Contractual' },
      { id: 'extracontractual', label: 'Extracontractual' },
    ];
    const SUBTIPOS_EVALUACION = [
      { id: 'todos', label: 'Todos' },
      { id: 'aplicacion', label: 'Aplicación' },
      { id: 'deteccion_error', label: 'Detección de error' },
      { id: 'justificacion', label: 'Justificación' },
      { id: 'discriminacion_mc', label: 'Discriminación MC' },
    ];

    function subtemasDisponibles(items) {
      const set = new Set();
      items.forEach(it => { if (it.subtema) set.add(it.subtema); });
      return Array.from(set).sort();
    }

    // ══════════════════════════════════════════════════════════════════
    // RENDER DE FILTROS
    // ══════════════════════════════════════════════════════════════════
    function renderFiltros() {
      document.getElementById('fila-rama').innerHTML =
        `<span class="eje-label">¿Qué quieres repasar hoy?</span>` +
        RAMAS.map(r => r.disabled
          ? `<button class="filtro-btn disabled" disabled title="Próximamente">${r.label}</button>`
          : `<button class="filtro-btn ${ramaActiva === r.id ? 'active' : ''}" onclick="setRama('${r.id}')">${r.label}</button>`
        ).join('');

      document.getElementById('fila-materia').innerHTML =
        `<span class="eje-label">Materia</span>` +
        MATERIAS_CIVIL.map(m => m.disabled
          ? `<button class="filtro-btn disabled" disabled title="Próximamente">${m.label}</button>`
          : `<button class="filtro-btn ${materiaActiva === m.id ? 'active' : ''}" onclick="setMateria('${m.id}')">${m.label}</button>`
        ).join('');

        filaArea.style.display = '';

        filaArea.innerHTML = '';
        filaArea.style.display = 'none';

      document.getElementById('fila-modelo').innerHTML =

    function renderFilaSubtipo() {
      const fila = document.getElementById('fila-subtipo');
      fila.classList.add('subtipo');
      if (modeloActivo === 'evaluacion') {
        fila.innerHTML = `<span class="eje-label">Subtipo</span>` +
          SUBTIPOS_EVALUACION.map(s => `<button class="filtro-btn ${subtipoActivo === s.id ? 'active' : ''}" onclick="setSubtipo('${s.id}')">${s.label}</button>`).join('');
        fila.style.display = '';
      } else if (modeloActivo === 'alternativa' || modeloActivo === 'memorice') {
        const fuente = modeloActivo === 'alternativa' ? datosAlternativas : datosMemoriceArticulos;
        const filtradasPorMateria = fuente.filter(it => areaActiva === 'todas' || normalizarMateria(it.materia) === areaActiva);
        const subtemas = subtemasDisponibles(filtradasPorMateria);
        if (subtemas.length === 0) { fila.innerHTML = ''; fila.style.display = 'none'; return; }
        fila.innerHTML = `<span class="eje-label">Subtipo</span>` +
          `<button class="filtro-btn ${subtipoActivo === 'todos' ? 'active' : ''}" onclick="setSubtipo('todos')">Todos</button>` +
          subtemas.map(s => `<button class="filtro-btn ${subtipoActivo === s ? 'active' : ''}" onclick="setSubtipo(${JSON.stringify(s)})">${escaparHtmlBase(s)}</button>`).join('');
        fila.style.display = '';
      } else {
        fila.innerHTML = '';
        fila.style.display = 'none';
      }

      const filaMetodo = document.getElementById('fila-metodo');
      if (modeloActivo === 'memorice') {
        filaMetodo.innerHTML = `<span class="eje-label">Método</span>` +
          `<button class="filtro-btn ${metodoMemorice === 'A' ? 'active' : ''}" onclick="setMetodoMemorice('A')">Método A (progresivo)</button>` +
          `<button class="filtro-btn ${metodoMemorice === 'B' ? 'active' : ''}" onclick="setMetodoMemorice('B')">Método B (cláusulas)</button>`;
        filaMetodo.style.display = '';
      } else {
        filaMetodo.innerHTML = '';
        filaMetodo.style.display = 'none';
      }
    }

    function setRama(r) { ramaActiva = r; materiaActiva = 'todas'; areaActiva = 'todas'; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setMateria(m) { materiaActiva = m; areaActiva = 'todas'; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setArea(a) { areaActiva = a; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setModelo(m) { modeloActivo = m; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setSubtipo(s) { subtipoActivo = s; renderFiltros(); iniciarSesion(); }

    function iniciarSesion() {
      if (modeloActivo === 'evaluacion') iniciarEvaluacion();
      else if (modeloActivo === 'flashcard') iniciarFlashcardsModelo();
      else if (modeloActivo === 'alternativa') iniciarAlternativasModelo();
      else if (modeloActivo === 'memorice') iniciarMemoriceModelo();
    }

    // ══════════════════════════════════════════════════════════════════
    // MODELO: EVALUACIÓN (sin cambios de comportamiento; solo el filtro
    // de materia/subtipo cambia de dónde viene)
    // ══════════════════════════════════════════════════════════════════
    let itemsFiltrados = [];
    let idxActual = 0;
    let creditoTotal = 0;
    let itemsCompletados = 0;
    let seleccionMC = null;

    function iniciarEvaluacion() {
      itemsFiltrados = banco.filter(item => {
        if (!TEMAS_EN_ALCANCE.includes(item.tema)) return false;
        const mat = normalizarMateria(item.tema);
        if (areaActiva !== 'todas' && mat !== areaActiva) return false;
        if (subtipoActivo !== 'todos' && item.tipo !== subtipoActivo) return false;
        return true;
      });
      itemsFiltrados.sort(() => Math.random() - 0.5);
      idxActual = 0; creditoTotal = 0; itemsCompletados = 0;
      renderItemEvaluacion();
    }

    function renderItemEvaluacion() {
      if (itemsFiltrados.length === 0) {
        document.getElementById('practica-container').innerHTML = `<div class="estado-vacio">No hay ítems de Evaluación para esta combinación de filtros todavía.</div>`;
        return;
      }
      if (idxActual >= itemsFiltrados.length) { renderResultadosEvaluacion(); return; }
      const item = itemsFiltrados[idxActual];

      const pct = Math.round((idxActual / itemsFiltrados.length) * 100);
      const tipoLabel = { aplicacion: 'Aplicación', deteccion_error: 'Detección de error', justificacion: 'Justificación', discriminacion_mc: 'Discriminación' }[item.tipo];
      const tipoCss   = { aplicacion: 'badge-aplicacion', deteccion_error: 'badge-deteccion', justificacion: 'badge-justificacion', discriminacion_mc: 'badge-mc' }[item.tipo];
      const instruccion = {
        aplicacion: 'Escribe tu análisis completo antes de ver cualquier opción.',
        deteccion_error: 'Identifica y explica cada error que encuentres.',
