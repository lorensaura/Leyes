    // ══════════════════════════════════════════════════════════════════
    // MOTOR DE MEMORICE (ocultamiento progresivo + corrección por palabra)
    // ══════════════════════════════════════════════════════════════════
    const ARTICULOS_TOLERADOS = ['el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas'];
    const GRUPOS_EQUIVALENTES = [['por', 'en'], ['de', 'del'], ['a', 'al']];
    const PALABRAS_FUNCIONALES = new Set([
      'el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas',
      'de', 'del', 'en', 'por', 'para', 'con', 'a', 'al', 'sin', 'sobre', 'entre', 'hacia', 'hasta', 'desde',
      'y', 'o', 'u', 'ni', 'que', 'como', 'pero', 'si', 'se', 'su', 'sus', 'lo', 'le', 'les',
      'es', 'son', 'ha', 'han', 'sea', 'sean',
    ]);

    // "un/una/uno" quedan afuera a propósito: son casi siempre el artículo
    // ("una declaración"), no el número, y confundirlos sería peor que el
    // problema que se quiere resolver. Los demás números casi no se usan
    // como otra cosa en un texto legal, así que "cinco" y "5" se tratan
    // como la misma respuesta (es la misma norma, solo cambia cómo se
    // escribió el número — no debería marcarse como error).
    const NUMEROS_A_DIGITO = {
      dos: '2', tres: '3', cuatro: '4', cinco: '5', seis: '6', siete: '7', ocho: '8', nueve: '9', diez: '10',
      once: '11', doce: '12', trece: '13', catorce: '14', quince: '15',
      dieciseis: '16', diecisiete: '17', dieciocho: '18', diecinueve: '19', veinte: '20',
      treinta: '30', cuarenta: '40', cincuenta: '50', sesenta: '60', setenta: '70', ochenta: '80', noventa: '90',
      cien: '100', ciento: '100', mil: '1000',
    };

    function normalizarPalabra(w) {
      const limpia = w.trim().toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[.,;:!?¿¡"'«»()\[\]]/g, '');
      return NUMEROS_A_DIGITO[limpia] || limpia;
    }
    // Quita tildes y diacríticos para comparar texto libre sin que una alumna
    // pierda crédito solo por escribir "presuncion" en vez de "presunción",
    // o "aplico" en vez de "aplicó". Usado por el matching de keywords de
    // Evaluación (recuperación libre), no por el motor de Memorice, que ya
    // tiene su propia normalización más estricta en normalizarPalabra.
    function quitarTildes(s) {
      return (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '');
    }
    // Las respuestas modelo deben leerse como una lista de puntos, uno bajo
    // el otro, no como un párrafo corrido. Esta función arma esos párrafos
    // de dos maneras: (a) el texto ya puede traer saltos dobles ("\n\n")
    // marcados a mano en el punto exacto donde empieza cada idea nueva
    // (convención para contenido nuevo); (b) si además queda algún marcador
    // de enumeración ("(1)", "(i)", "Error 1:") dentro de un mismo párrafo,
    // también se separa ahí. Cada párrafo resultante se envuelve en <p>.
    function formatearListasRespuesta(texto) {
      if (!texto) return texto;
      const marcador = /\(\d{1,2}\)|\([ivxIVX]{1,4}\)|Error \d+:/g;
      const conMarcadores = texto.replace(marcador, (match, offset) => offset === 0 ? match : '\n\n' + match);
      return conMarcadores.split(/\n\n+/).map(p => p.trim()).filter(Boolean).map(p => `<p>${p}</p>`).join('');
    }
    // Normaliza el número de artículo para comparar lo que la alumna escribe
    // (ej. "1547 inciso 3", "Art. 1547 inc. 3°") contra el campo `articulo`
    // guardado (ej. "1547 inc. 3°"): sin tildes, sin símbolos de grado ni
    // puntuación, "inciso" tratado igual que "inc".
    function normalizarNumeroArticulo(s) {
      return (s || '').trim().toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/\binciso\b/g, 'inc')
        .replace(/\bart\.?\b/g, '')
        .replace(/[°ºª.,]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }
    function tokenizar(texto) { return texto.trim().split(/\s+/).filter(Boolean); }
    function mismoGrupoFuncional(a, b) { return a === b || GRUPOS_EQUIVALENTES.some(g => g.includes(a) && g.includes(b)); }
    function esCritica(palabraNorm, criticasNorm) { return criticasNorm.has(palabraNorm); }
    function palabrasEquivalentes(esperada, escrita, criticasNorm) {
      if (esCritica(esperada, criticasNorm)) return esperada === escrita;
      return esperada === escrita || mismoGrupoFuncional(esperada, escrita);
    }

    function compararBlank(esperadoTexto, escritoTexto, palabrasCriticas) {
      const criticasNorm = new Set((palabrasCriticas || []).map(normalizarPalabra));
      const esperadas = tokenizar(esperadoTexto).map(normalizarPalabra);
      const escritas = tokenizar(escritoTexto).map(normalizarPalabra);
      const esperadasF = esperadas.filter(p => !(ARTICULOS_TOLERADOS.includes(p) && !esCritica(p, criticasNorm)));
      const escritasF = escritas.filter(p => !ARTICULOS_TOLERADOS.includes(p) || esCritica(p, criticasNorm));
      if (esperadasF.length !== escritasF.length) return { correcto: false };
      for (let i = 0; i < esperadasF.length; i++) {
        if (!palabrasEquivalentes(esperadasF[i], escritasF[i], criticasNorm)) return { correcto: false };
      }
      return { correcto: true };
    }

    function diffCompleto(textoEsperado, textoEscrito, palabrasCriticas) {
      const criticasNorm = new Set((palabrasCriticas || []).map(normalizarPalabra));
      const esperadasOriginal = tokenizar(textoEsperado);
      const escritasOriginal = tokenizar(textoEscrito);
      const esperadas = esperadasOriginal.map(normalizarPalabra);
      const escritas = escritasOriginal.map(normalizarPalabra);
      const n = esperadas.length, m = escritas.length;
      const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
      for (let i = n - 1; i >= 0; i--) {
        for (let j = m - 1; j >= 0; j--) {
          dp[i][j] = palabrasEquivalentes(esperadas[i], escritas[j], criticasNorm)
            ? dp[i + 1][j + 1] + 1
            : Math.max(dp[i + 1][j], dp[i][j + 1]);
        }
      }
      const items = [];
      let i = 0, j = 0, ok = 0, huboError = false;
      while (i < n && j < m) {
        if (palabrasEquivalentes(esperadas[i], escritas[j], criticasNorm)) {
          items.push({ tipo: 'ok', palabra: esperadasOriginal[i] }); ok++; i++; j++;
        } else if (dp[i + 1][j] >= dp[i][j + 1]) {
          items.push({ tipo: 'falta', palabra: esperadasOriginal[i], critica: esCritica(esperadas[i], criticasNorm) });
          huboError = true; i++;
        } else {
          items.push({ tipo: 'sobra', palabra: escritasOriginal[j] });
          huboError = true; j++;
        }
      }
      while (i < n) { items.push({ tipo: 'falta', palabra: esperadasOriginal[i], critica: esCritica(esperadas[i], criticasNorm) }); huboError = true; i++; }
      while (j < m) { items.push({ tipo: 'sobra', palabra: escritasOriginal[j] }); huboError = true; j++; }
      return { items, correcto: !huboError, totalEsperadas: n, okCount: ok };
    }

    function gruposAutomaticos(texto) {
      const palabras = tokenizar(texto);
      const semanticas = palabras
        .map((p, idx) => ({ idx, palabra: p, norm: normalizarPalabra(p) }))
        .filter(p => !PALABRAS_FUNCIONALES.has(p.norm) && p.norm.length > 0);
      const ordenadas = [...semanticas].sort((a, b) => b.norm.length - a.norm.length || a.idx - b.idx);
      const total = ordenadas.length;
      // N1=30% oculto, N2=60% acumulado, N3=90% acumulado. N4 no usa grupos:
      // es una sola caja de texto libre, sin ninguna pista de estructura
      // (ver construirBlanks).
      const corte = [Math.ceil(total * 0.3), Math.ceil(total * 0.6), Math.ceil(total * 0.9), total];
      const grupos = [[], [], [], []];
      ordenadas.forEach((p, i) => {
        if (i < corte[0]) grupos[0].push(p.palabra);
        else if (i < corte[1]) grupos[1].push(p.palabra);
        else if (i < corte[2]) grupos[2].push(p.palabra);
        else grupos[3].push(p.palabra);
      });
      return grupos;
    }

    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    // Marcador con caracteres del área de uso privado Unicode (nunca aparecen
    // en texto legal real) para no confundirse con números literales del
    // artículo (ej. "plazo de 10 días"), y coincidencia con límite de palabra
    // (vía \p{L}, no \w, porque \w no reconoce tildes/ñ) para no matchear un
    // span corto dentro de una palabra más larga que lo contiene.
    function construirBlanks(articulo, nivel) {
      if (nivel >= 4) return { partes: [{ tipo: 'blank_total', esperado: articulo.texto }] };
      const curado = !!(articulo.prioridad_ocultamiento && articulo.prioridad_ocultamiento.length > 0);
      const grupos = curado ? articulo.prioridad_ocultamiento : gruposAutomaticos(articulo.texto);
      const ocultarSpans = [];
      for (let g = 0; g < nivel && g < grupos.length; g++) {
        for (const span of grupos[g]) { if (span !== '*') ocultarSpans.push(span); }
      }
      ocultarSpans.sort((a, b) => b.length - a.length);

      const ABRE = '', CIERRA = '';
      let texto = articulo.texto;
      const encontrados = [];
      ocultarSpans.forEach((span) => {
        const patron = new RegExp(`(?<![\\p{L}\\p{N}])${escapeRegExp(span)}(?![\\p{L}\\p{N}])`, 'u');
        const m = texto.match(patron);
        if (!m) return;
        const pos = m.index;
        texto = texto.slice(0, pos) + ABRE + encontrados.length + CIERRA + texto.slice(pos + span.length);
        encontrados.push(span);
      });

      const partes = [];
      const regex = new RegExp(`${ABRE}(\\d+)${CIERRA}`, 'g');
      let ultimo = 0, m;
      while ((m = regex.exec(texto)) !== null) {
        if (m.index > ultimo) partes.push({ tipo: 'texto', texto: texto.slice(ultimo, m.index) });
        partes.push({ tipo: 'blank', esperado: encontrados[Number(m[1])] });
        ultimo = m.index + m[0].length;
      }
      if (ultimo < texto.length) partes.push({ tipo: 'texto', texto: texto.slice(ultimo) });
      return { partes };
    }

    // ══════════════════════════════════════════════════════════════════
    // NORMALIZACIÓN DE MATERIA (tolera distintos formatos ya guardados)
    // ══════════════════════════════════════════════════════════════════
    function normalizarMateria(raw) {
      if (!raw) return 'general';
      const s = raw.toLowerCase();
      if (s.includes('precontractual')) return 'precontractual';
      if (s.includes('extracontractual')) return 'extracontractual';
      if (s.includes('contractual')) return 'contractual';
      if (s.includes('procesal')) return 'procesal';
      return 'general';
    }
    function escaparHtmlBase(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function sumarDias(dias) { return new Date(Date.now() + dias * 24 * 60 * 60 * 1000).toISOString(); }

    // ══════════════════════════════════════════════════════════════════
    // ESTADO DE FILTROS (Eje 1 Materia · Eje 2 Modelo · Eje 3 Subtipo)
    // ══════════════════════════════════════════════════════════════════
    let ramaActiva = 'civil';
    let materiaActiva = 'todas'; // materia dentro de Civil (Responsabilidad, Bienes, etc.)
    let areaActiva = 'todas'; // dentro de Responsabilidad: precontractual/contractual/extracontractual
    let modeloActivo = 'evaluacion';
    let subtipoActivo = 'todos';

    // Contenido cargado desde Supabase (Alternativas, Memorice, Flashcards)
    let datosAlternativas = [];
    let datosMemoriceArticulos = [];
    let progresoMemorice = {}; // articulo_id -> {nivel_actual, proxima_revision, historial}
    let datosFlashcards = [];
    let progresoFlashcards = {}; // flashcard_id -> {calificacion, proxima_revision}

    const TEMAS_EN_ALCANCE = [
      'Responsabilidad contractual',
      'Responsabilidad extracontractual',
      'Responsabilidad precontractual',
      'Responsabilidad civil'
    ];

    const MODELOS = [
      { id: 'evaluacion', label: 'Evaluación' },
      { id: 'flashcard', label: 'Flashcards' },
      { id: 'alternativa', label: 'Alternativas' },
      { id: 'memorice', label: 'Memorice' },
    ];
    const RAMAS = [
      { id: 'civil', label: 'Civil' },
      { id: 'procesal', label: 'Procesal', disabled: true },
    ];
    const MATERIAS_CIVIL = [
      { id: 'todas', label: 'Todas' },
      { id: 'responsabilidad', label: 'Responsabilidad' },
      { id: 'acto_juridico', label: 'Acto Jurídico', disabled: true },
      { id: 'bienes', label: 'Bienes', disabled: true },
      { id: 'obligaciones', label: 'Obligaciones', disabled: true },
      { id: 'contratos', label: 'Contratos', disabled: true },
      { id: 'familia', label: 'Familia', disabled: true },
      { id: 'sucesorio', label: 'Sucesorio', disabled: true },
    ];
    const AREAS_RESPONSABILIDAD = [
      { id: 'todas', label: 'Todas' },
      { id: 'precontractual', label: 'Precontractual' },
      { id: 'contractual', label: 'Contractual' },
      { id: 'extracontractual', label: 'Extracontractual' },
    ];
    const SUBTIPOS_EVALUACION = [
      { id: 'todos', label: 'Todos' },
      { id: 'aplicacion', label: 'Aplicación' },
      { id: 'deteccion_error', label: 'Detección de error' },
      { id: 'justificacion', label: 'Justificación' },
      { id: 'discriminacion_mc', label: 'Discriminación MC' },
    ];

    function subtemasDisponibles(items) {
      const set = new Set();
      items.forEach(it => { if (it.subtema) set.add(it.subtema); });
      return Array.from(set).sort();
    }

    // ══════════════════════════════════════════════════════════════════
    // RENDER DE FILTROS
    // ══════════════════════════════════════════════════════════════════
    function renderFiltros() {
      document.getElementById('fila-rama').innerHTML =
        `<span class="eje-label">¿Qué quieres repasar hoy?</span>` +
        RAMAS.map(r => r.disabled
          ? `<button class="filtro-btn disabled" disabled title="Próximamente">${r.label}</button>`
          : `<button class="filtro-btn ${ramaActiva === r.id ? 'active' : ''}" onclick="setRama('${r.id}')">${r.label}</button>`
        ).join('');

      document.getElementById('fila-materia').innerHTML =
        `<span class="eje-label">Materia</span>` +
        MATERIAS_CIVIL.map(m => m.disabled
          ? `<button class="filtro-btn disabled" disabled title="Próximamente">${m.label}</button>`
          : `<button class="filtro-btn ${materiaActiva === m.id ? 'active' : ''}" onclick="setMateria('${m.id}')">${m.label}</button>`
        ).join('');

      const filaArea = document.getElementById('fila-area');
      if (materiaActiva === 'responsabilidad') {
        filaArea.innerHTML = `<span class="eje-label">Área</span>` +
          AREAS_RESPONSABILIDAD.map(a => `<button class="filtro-btn ${areaActiva === a.id ? 'active' : ''}" onclick="setArea('${a.id}')">${a.label}</button>`).join('');
        filaArea.style.display = '';
      } else {
        filaArea.innerHTML = '';
        filaArea.style.display = 'none';
      }

      document.getElementById('fila-modelo').innerHTML =
        `<span class="eje-label">Modelo</span>` +
        MODELOS.map(m => `<button class="filtro-btn ${modeloActivo === m.id ? 'active' : ''}" onclick="setModelo('${m.id}')">${m.label}</button>`).join('');

      renderFilaSubtipo();
    }

    function renderFilaSubtipo() {
      const fila = document.getElementById('fila-subtipo');
      fila.classList.add('subtipo');
      if (modeloActivo === 'evaluacion') {
        fila.innerHTML = `<span class="eje-label">Subtipo</span>` +
          SUBTIPOS_EVALUACION.map(s => `<button class="filtro-btn ${subtipoActivo === s.id ? 'active' : ''}" onclick="setSubtipo('${s.id}')">${s.label}</button>`).join('');
        fila.style.display = '';
      } else if (modeloActivo === 'alternativa' || modeloActivo === 'memorice') {
        const fuente = modeloActivo === 'alternativa' ? datosAlternativas : datosMemoriceArticulos;
        const filtradasPorMateria = fuente.filter(it => areaActiva === 'todas' || normalizarMateria(it.materia) === areaActiva);
        const subtemas = subtemasDisponibles(filtradasPorMateria);
        if (subtemas.length === 0) { fila.innerHTML = ''; fila.style.display = 'none'; return; }
        fila.innerHTML = `<span class="eje-label">Subtipo</span>` +
          `<button class="filtro-btn ${subtipoActivo === 'todos' ? 'active' : ''}" onclick="setSubtipo('todos')">Todos</button>` +
          subtemas.map(s => `<button class="filtro-btn ${subtipoActivo === s ? 'active' : ''}" onclick="setSubtipo(${JSON.stringify(s)})">${escaparHtmlBase(s)}</button>`).join('');
        fila.style.display = '';
      } else {
        fila.innerHTML = '';
        fila.style.display = 'none';
      }

      const filaMetodo = document.getElementById('fila-metodo');
      if (modeloActivo === 'memorice') {
        filaMetodo.innerHTML = `<span class="eje-label">Método</span>` +
          `<button class="filtro-btn ${metodoMemorice === 'A' ? 'active' : ''}" onclick="setMetodoMemorice('A')">Método A (progresivo)</button>` +
          `<button class="filtro-btn ${metodoMemorice === 'B' ? 'active' : ''}" onclick="setMetodoMemorice('B')">Método B (cláusulas)</button>`;
        filaMetodo.style.display = '';
      } else {
        filaMetodo.innerHTML = '';
        filaMetodo.style.display = 'none';
      }
    }

    function setRama(r) { ramaActiva = r; materiaActiva = 'todas'; areaActiva = 'todas'; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setMateria(m) { materiaActiva = m; areaActiva = 'todas'; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setArea(a) { areaActiva = a; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setModelo(m) { modeloActivo = m; subtipoActivo = 'todos'; renderFiltros(); iniciarSesion(); }
    function setSubtipo(s) { subtipoActivo = s; renderFiltros(); iniciarSesion(); }

    function iniciarSesion() {
      if (modeloActivo === 'evaluacion') iniciarEvaluacion();
      else if (modeloActivo === 'flashcard') iniciarFlashcardsModelo();
      else if (modeloActivo === 'alternativa') iniciarAlternativasModelo();
      else if (modeloActivo === 'memorice') iniciarMemoriceModelo();
    }

    // ══════════════════════════════════════════════════════════════════
    // MODELO: EVALUACIÓN (sin cambios de comportamiento; solo el filtro
    // de materia/subtipo cambia de dónde viene)
    // ══════════════════════════════════════════════════════════════════
    let itemsFiltrados = [];
    let idxActual = 0;
    let creditoTotal = 0;
    let itemsCompletados = 0;
    let seleccionMC = null;

    function iniciarEvaluacion() {
      itemsFiltrados = banco.filter(item => {
        if (!TEMAS_EN_ALCANCE.includes(item.tema)) return false;
        const mat = normalizarMateria(item.tema);
        if (areaActiva !== 'todas' && mat !== areaActiva) return false;
        if (subtipoActivo !== 'todos' && item.tipo !== subtipoActivo) return false;
        return true;
      });
      itemsFiltrados.sort(() => Math.random() - 0.5);
      idxActual = 0; creditoTotal = 0; itemsCompletados = 0;
      renderItemEvaluacion();
    }

    function renderItemEvaluacion() {
      if (itemsFiltrados.length === 0) {
        document.getElementById('practica-container').innerHTML = `<div class="estado-vacio">No hay ítems de Evaluación para esta combinación de filtros todavía.</div>`;
        return;
      }
      if (idxActual >= itemsFiltrados.length) { renderResultadosEvaluacion(); return; }
      const item = itemsFiltrados[idxActual];

      const pct = Math.round((idxActual / itemsFiltrados.length) * 100);
      const tipoLabel = { aplicacion: 'Aplicación', deteccion_error: 'Detección de error', justificacion: 'Justificación', discriminacion_mc: 'Discriminación' }[item.tipo];
      const tipoCss   = { aplicacion: 'badge-aplicacion', deteccion_error: 'badge-deteccion', justificacion: 'badge-justificacion', discriminacion_mc: 'badge-mc' }[item.tipo];
      const instruccion = {
        aplicacion: 'Escribe tu análisis completo antes de ver cualquier opción.',
        deteccion_error: 'Identifica y explica cada error que encuentres.',
        justificacion: 'Explica el fundamento. Sé preciso en artículos y consecuencias.',
        discriminacion_mc: 'Primero escribe lo que recuerdas. Luego verás las opciones.'
      }[item.tipo];

      document.getElementById('practica-container').innerHTML = `
        <div class="quiz-progress">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${idxActual + 1} / ${itemsFiltrados.length}</span>
        </div>
        <div class="item-card">
          <div class="item-meta">
            <span class="badge-tipo ${tipoCss}">${tipoLabel}</span>
            <span class="badge-materia">${item.tema} · ${item.subtema}</span>
            <span class="item-num">${item.id}</span>
          </div>
          ${item.caso ? `<div class="caso-box"><span class="caso-label">Caso</span>${item.caso}</div>` : ''}
          <div class="pregunta-text">${item.enunciado}</div>
          <div class="step-label"><div class="step-num-badge">1</div>Recuperación libre — ${instruccion}</div>
          <textarea id="recall-text" placeholder="Escribe aquí tu respuesta desde cero…" oninput="updateChar()" onpaste="return false;" ondrop="return false;"></textarea>
          <div class="char-count"><span id="char-count">0</span> caracteres</div>
          <div id="recall-hint" class="recall-hint"></div>
          <div class="btn-row">
            <button class="btn btn-primary" id="btn-evaluar" onclick="evaluarRespuesta()">Evaluar mi respuesta</button>
            <button class="btn btn-outline" onclick="skipItem()">Saltar ítem</button>
          </div>
          <div id="feedback-area"></div>
        </div>
      `;
    }

    function updateChar() {
      const txt = document.getElementById('recall-text');
      document.getElementById('char-count').textContent = txt.value.length;
    }

    function evaluarRespuesta(esSegundaPasada = false) {
      const item = itemsFiltrados[idxActual];
      const texto = quitarTildes((document.getElementById('recall-text')?.value || '').toLowerCase());
      if (texto.trim().length < 30) {
        document.getElementById('recall-text').style.borderColor = '#C41E2E';
        setTimeout(() => document.getElementById('recall-text').style.borderColor = '', 1500);
        const hint = document.getElementById('recall-hint');
        if (hint) hint.textContent = 'Escribe al menos 30 caracteres antes de evaluar tu respuesta.';
        return;
      }
      const hintPrevio = document.getElementById('recall-hint');
      if (hintPrevio) hintPrevio.textContent = '';
      document.getElementById('btn-evaluar').disabled = true;

      if (!item.elementos_clave || item.elementos_clave.length === 0) {
        const cont = item.tipo === 'discriminacion_mc'
          ? `<button class="btn btn-dark" onclick="mostrarMC()">Continuar → Alternativas</button>`
          : `<button class="btn btn-dark" onclick="mostrarModelo()">Ver respuesta modelo</button>`;
        document.getElementById('feedback-area').innerHTML = `
          <div class="feedback-panel">
            <div class="veredicto">✓ Recuperación registrada. Ahora contrasta tu recuerdo con las alternativas y elige la correcta.</div>
            <div class="btn-row" style="margin-top:1.25rem;">${cont}</div>
          </div>`;
        document.getElementById('feedback-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }

      const acertados = [];
      const faltantes = [];
      item.elementos_clave.forEach(el => {
        const found = el.keywords.some(kw => texto.includes(quitarTildes(kw.toLowerCase())));
        if (found) acertados.push(el.texto); else faltantes.push(el);
      });

      const credito = acertados.length / item.elementos_clave.length;
      const pct = Math.round(credito * 100);
      const color = credito >= 0.75 ? '#1A7A40' : credito >= 0.4 ? '#A06000' : '#C41E2E';

      let siguienteAccion;
      if (credito >= 0.75) siguienteAccion = 'avanzar';
      else if (credito >= 0.35 && !esSegundaPasada) siguienteAccion = 'segunda_pasada';
      else siguienteAccion = 'ver_modelo';

      let veredicto, feedbackDiag;
      if (credito >= 0.75) {
        veredicto = '✓ Respuesta sólida. Cubriste los elementos esenciales.';
        feedbackDiag = faltantes.length > 0 ? 'Buen trabajo. Esto es lo único que te faltó:' : 'Respuesta completa.';
      } else if (credito >= 0.35) {
        veredicto = '◐ Respuesta parcial. Captaste la idea general pero faltaron elementos clave.';
        feedbackDiag = `Identificaste correctamente ${acertados.length} de ${item.elementos_clave.length} elementos. ${esSegundaPasada ? 'Revisa el modelo abajo.' : 'Tienes una segunda pasada.'}`;
      } else {
        veredicto = '✗ Respuesta insuficiente. Hay que trabajar este punto.';
        feedbackDiag = `Solo cubriste ${acertados.length} de ${item.elementos_clave.length} elementos. Revisa el manual de ${item.tema} antes de continuar.`;
      }

      creditoTotal += credito;
      itemsCompletados++;

      const feedbackHTML = `
        <div class="feedback-panel">
          <div class="feedback-header">
            <div class="credito-bar-wrap">
              <div class="credito-label">Crédito parcial</div>
              <div class="credito-bar-bg"><div class="credito-bar-fill" style="width:${pct}%; background:${color}"></div></div>
            </div>
            <div class="credito-pct" style="color:${color}">${pct}%</div>
          </div>
          <div class="veredicto">${veredicto}</div>
          <div class="elementos-grid">
            <div class="elementos-col ok">
              <h4>✓ Presentes</h4>
              ${acertados.length > 0 ? acertados.map(e => `<div class="elemento-tag"><div class="dot"></div><span>${e}</span></div>`).join('') : '<div class="elemento-tag" style="color:#7A6E5F; font-style:italic">Ninguno detectado</div>'}
            </div>
            ${siguienteAccion !== 'segunda_pasada' && faltantes.length > 0 ? `
            <div class="elementos-col faltan">
              <h4>✗ Faltantes</h4>
              ${faltantes.map(el => `<div class="elemento-tag"><div class="dot"></div><span>${el.texto}</span></div>`).join('')}
            </div>` : ''}
          </div>
          <div class="feedback-diag">${feedbackDiag}</div>
          ${siguienteAccion === 'segunda_pasada' ? `
            <div class="segunda-pasada" style="margin-top:1.25rem;">
              <div class="segunda-title">Segunda pasada</div>
              <div class="segunda-text">Casi, intenta de nuevo: <strong>${escaparHtmlBase(faltantes.map(el => el.pregunta).filter(Boolean).join(' ') || '¿Qué otro elemento le falta a tu respuesta?')}</strong></div>
              <textarea id="recall-text-2" style="min-height:90px;" placeholder="Complementa o reescribe tu respuesta…" onpaste="return false;" ondrop="return false;"></textarea>
              <div class="btn-row" style="margin-top:0.75rem;">
                <button class="btn btn-primary" onclick="evaluarSegundaPasada()">Evaluar segunda pasada</button>
                <button class="btn btn-outline" onclick="mostrarModelo()">Ver respuesta modelo</button>
              </div>
            </div>` : `
            <div class="btn-row" style="margin-top:1.25rem;">
              ${item.tipo === 'discriminacion_mc' ? `<button class="btn btn-dark" onclick="mostrarMC()">Continuar → Alternativa de discriminación</button>` : `<button class="btn btn-dark" onclick="mostrarModelo()">Ver respuesta modelo</button>`}
            </div>`}
        </div>`;

      document.getElementById('feedback-area').innerHTML = feedbackHTML;
      document.getElementById('feedback-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function evaluarSegundaPasada() {
      const txt2 = document.getElementById('recall-text-2')?.value || '';
      const txt1 = document.getElementById('recall-text')?.value || '';
      const combinado = txt1 + ' ' + txt2;
      const fakeInput = document.createElement('textarea');
      fakeInput.id = 'recall-text';
      fakeInput.value = combinado;
      document.getElementById('recall-text').replaceWith(fakeInput);
      evaluarRespuesta(true);
    }

    function mostrarMC() {
      const item = itemsFiltrados[idxActual];
      const letras = ['A', 'B', 'C', 'D'];
      const mcHTML = `
        <div class="mc-section">
          <div class="step-label"><div class="step-num-badge">2</div>Discriminación — Selecciona la opción correcta y justifica en una línea.</div>
          <div class="mc-intro">Ahora que ya escribiste tu análisis, elige la alternativa que corresponde.</div>
          <div class="options-grid" id="mc-options">
            ${item.opciones.map((op, i) => `
              <button class="option-btn" id="mc-opt-${i}" onclick="selectMC(${i})">
                <span class="option-letter">${letras[i]}</span><span>${op.texto}</span>
              </button>`).join('')}
          </div>
          <div class="justificacion-label">Justificación (1 línea) — ¿Por qué elegiste esa opción?</div>
          <textarea id="justificacion-text" class="justificacion" placeholder="Elijo X porque…" onpaste="return false;" ondrop="return false;"></textarea>
          <div class="btn-row"><button class="btn btn-primary" id="btn-confirmar-mc" onclick="evaluarMC()">Confirmar selección</button></div>
          <div id="mc-feedback"></div>
        </div>`;
      document.getElementById('feedback-area').insertAdjacentHTML('beforeend', mcHTML);
      document.getElementById('mc-options').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function selectMC(idx) {
      seleccionMC = idx;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('mc-opt-' + idx).classList.add('selected');
    }

    function evaluarMC() {
      const item = itemsFiltrados[idxActual];
      if (seleccionMC === null) return;
      const btnConfirmar = document.getElementById('btn-confirmar-mc');
      if (btnConfirmar) { if (btnConfirmar.disabled) return; btnConfirmar.disabled = true; }
      const letras = ['A', 'B', 'C', 'D'];
      const correctaIdx = item.opciones.findIndex(op => op.letra === item.correcta);
      const esCorrecta = seleccionMC === correctaIdx;
      creditoTotal += esCorrecta ? 1 : 0;
      itemsCompletados++;
      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === correctaIdx) btn.classList.add(esCorrecta && i === seleccionMC ? 'correct' : 'revealed');
      });
      if (!esCorrecta) {
        document.getElementById('mc-opt-' + seleccionMC).classList.remove('revealed');
        document.getElementById('mc-opt-' + seleccionMC).classList.add('wrong');
      }
      const opcionElegida = item.opciones[seleccionMC];
      const distractorFeedback = esCorrecta
        ? `<strong>Correcto.</strong> ${item.opciones[correctaIdx].rationale}`
        : `<strong>Incorrecto.</strong> Elegiste ${letras[seleccionMC]}: ${opcionElegida.rationale}. La correcta es ${item.correcta}: ${item.opciones[correctaIdx].rationale}`;
      document.getElementById('mc-feedback').innerHTML = `
        <div class="distractor-feedback">${distractorFeedback}</div>
        <div class="btn-row" style="margin-top:1rem;">
          <button class="btn btn-dark" onclick="siguienteEvaluacion()">${idxActual < itemsFiltrados.length - 1 ? 'Siguiente ítem →' : 'Ver resultados →'}</button>
        </div>`;
    }

    function mostrarModelo() {
      const item = itemsFiltrados[idxActual];
      const modeloHTML = `
        <div class="modelo-section">
          <div class="modelo-title">Respuesta orientadora</div>
          <div class="modelo-body">${formatearListasRespuesta(item.respuesta_modelo) || 'La corrección de este ítem se realiza al elegir la alternativa correcta.'}</div>
          <div class="articulos-ref">${(item.articulos_referencia || []).map(a => `<span class="art-tag">Art. ${a}</span>`).join('')}</div>
        </div>
        <div class="btn-row" style="margin-top:1.5rem; max-width:780px;">
          <button class="btn btn-dark" onclick="siguienteEvaluacion()">${idxActual < itemsFiltrados.length - 1 ? 'Siguiente ítem →' : 'Ver resultados →'}</button>
        </div>`;
      document.getElementById('feedback-area').insertAdjacentHTML('beforeend', modeloHTML);
      document.querySelector('.modelo-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function skipItem() { itemsCompletados++; siguienteEvaluacion(); }
    function siguienteEvaluacion() { idxActual++; renderItemEvaluacion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function renderResultadosEvaluacion() {
      const pct = itemsCompletados > 0 ? Math.round((creditoTotal / itemsCompletados) * 100) : 0;
      const emoji = pct >= 75 ? '🏆' : pct >= 50 ? '💪' : '📚';
      const msg = pct >= 75 ? '¡Buen dominio!' : pct >= 50 ? 'Vas por buen camino' : 'Hay que trabajar más';
      document.getElementById('practica-container').innerHTML = `
        <div class="results-card">
          <div class="results-emoji">${emoji}</div>
          <div class="results-title">${msg}</div>
          <div class="results-score">${pct}%</div>
          <div class="results-detail">Crédito promedio sobre ${itemsCompletados} ítems completados</div>
          <div class="results-items-detail">Aplicación y casos · Detección de error · Justificación · Discriminación</div>
          <button class="btn btn-primary" onclick="iniciarEvaluacion()" style="margin-right:.5rem;">Nueva sesión</button>
          <a href="manuales.html" class="btn btn-outline" style="display:inline-block; margin-top:.5rem;">Repasar manuales</a>
        </div>`;
    }

    // ══════════════════════════════════════════════════════════════════
    // MODELO: FLASHCARDS (mismo motor de repetición espaciada de siempre,
    // ahora también filtrable por materia)
    // ══════════════════════════════════════════════════════════════════
    let fcFiltradas = [];
    let fcIndice = 0;
    let fcVolteada = false;
    const DIAS_BIEN = 7, DIAS_MAS_O_MENOS = 3;

    function fcEsDebida(t) {
      const p = progresoFlashcards[t.id];
      if (!p) return true;
      if (p.calificacion === 'poco') return true;
      if (!p.proxima_revision) return true;
      return new Date(p.proxima_revision) <= new Date();
    }
    function fcFormatearRespuesta(texto) {
      const seguro = escaparHtmlBase(texto);
      return seguro
        .replace(/&lt;(\/?)(b|i|em|strong|u)&gt;/g, '<$1$2>')
        .replace(/&lt;span class='art'&gt;/g, '<span class="art">').replace(/&lt;\/span&gt;/g, '</span>');
    }
    function fcShuffle(arr) {
      const c = arr.slice();
      for (let i = c.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [c[i], c[j]] = [c[j], c[i]]; }
      return c;
    }

    async function iniciarFlashcardsModelo() {
      document.getElementById('practica-container').innerHTML = `<div class="estado-vacio"><div class="spinner"></div>Cargando flashcards…</div>`;
      if (datosFlashcards.length === 0) await cargarFlashcards();
      fcFiltradas = datosFlashcards.filter(t => {
        if (areaActiva !== 'todas' && normalizarMateria(t.materia) !== areaActiva) return false;
        return fcEsDebida(t);
      });
      fcFiltradas = fcShuffle(fcFiltradas);
      fcIndice = 0; fcVolteada = false;
      renderFlashcard();
    }

    function fcVoltear() { fcVolteada = !fcVolteada; renderFlashcard(); }
    function fcSiguiente() { if (fcIndice < fcFiltradas.length - 1) { fcIndice++; fcVolteada = false; renderFlashcard(); } }
    function fcAnterior() { if (fcIndice > 0) { fcIndice--; fcVolteada = false; renderFlashcard(); } }
    function fcBarajarDeNuevo() { fcFiltradas = fcShuffle(fcFiltradas); fcIndice = 0; fcVolteada = false; renderFlashcard(); }

    async function fcCalificar(valor) {
      const t = fcFiltradas[fcIndice];
      if (!t) return;
      let proxima = null;
      if (valor === 'bien') proxima = sumarDias(DIAS_BIEN);
      else if (valor === 'mas_o_menos') proxima = sumarDias(DIAS_MAS_O_MENOS);
      progresoFlashcards[t.id] = { calificacion: valor, proxima_revision: proxima };
      fcFiltradas.splice(fcIndice, 1);
      if (fcIndice >= fcFiltradas.length) fcIndice = Math.max(0, fcFiltradas.length - 1);
      fcVolteada = false;
      renderFlashcard();
      try {
        await sb.from('flashcard_progreso').upsert(
          { user_id: usuarioId, flashcard_id: t.id, calificacion: valor, ultima_revision: new Date().toISOString(), proxima_revision: proxima },
          { onConflict: 'user_id,flashcard_id' }
        );
      } catch (e) { /* no bloquea el estudio */ }
    }

    function renderFlashcard() {
      const cont = document.getElementById('practica-container');
      if (fcFiltradas.length === 0) {
        cont.innerHTML = `<div class="estado-vacio">¡Ya estudiaste todo lo que tocaba por ahora en esta materia! Vuelve más tarde.</div>`;
        return;
      }
      const t = fcFiltradas[fcIndice];
      const temaHtml = t.tema ? `<div class="fc-tema">${escaparHtmlBase(t.tema)}</div>` : '';
      const calificarHtml = fcVolteada ? `
        <div class="fc-calificar-fila">
          <button class="btn-calificar bien" onclick="fcCalificar('bien')">😊 Me acordaba</button>
          <button class="btn-calificar mas_o_menos" onclick="fcCalificar('mas_o_menos')">😐 Más o menos</button>
          <button class="btn-calificar poco" onclick="fcCalificar('poco')">😕 Poco</button>
        </div>` : '';
      cont.innerHTML = `
        <div style="max-width:720px;">
          <div class="quiz-progress">
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round((fcIndice / fcFiltradas.length) * 100)}%"></div></div>
            <span class="progress-text">${fcIndice + 1} / ${fcFiltradas.length}</span>
          </div>
          <div class="fc-tarjeta" onclick="fcVoltear()" style="max-width:none;">
            <div class="fc-dificultad ${t.dificultad}">${{ basica: 'Básica', intermedia: 'Intermedia', avanzada: 'Avanzada' }[t.dificultad] || t.dificultad}</div>
            ${temaHtml}
            <div class="fc-etiqueta">${fcVolteada ? 'Respuesta' : 'Pregunta'}</div>
            <div class="fc-texto">${fcVolteada ? fcFormatearRespuesta(t.respuesta) : escaparHtmlBase(t.pregunta)}</div>
            <div class="fc-pista">${fcVolteada ? 'Click para ver la pregunta' : 'Click para ver la respuesta'}</div>
          </div>
          ${calificarHtml}
          <div class="fc-controles">
            <button class="btn-control" style="padding:0.65rem 1.1rem;border-radius:8px;border:1.5px solid rgba(17,17,17,0.12);background:#FFFFFF;font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;" onclick="fcAnterior()" ${fcIndice === 0 ? 'disabled' : ''}>← Anterior</button>
            ${fcVolteada ? '' : `<button class="btn-primario" style="padding:0.65rem 1.4rem;border-radius:8px;border:none;background:#C41E2E;color:#F5EAD4;font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;" onclick="fcSiguiente()" ${fcIndice === fcFiltradas.length - 1 ? 'disabled' : ''}>Siguiente →</button>`}
          </div>
          <button class="fc-barajar" onclick="fcBarajarDeNuevo()">Barajar de nuevo</button>
        </div>
      `;
    }

    async function cargarFlashcards() {
      try {
        const [{ data: tarjetas, error: e1 }, { data: progreso, error: e2 }] = await Promise.all([
          sb.from('flashcards').select('id,tema,materia,pregunta,respuesta,dificultad').eq('publicado', true),
          sb.from('flashcard_progreso').select('flashcard_id,calificacion,proxima_revision').eq('user_id', usuarioId),
        ]);
        if (e1) throw e1;
        if (e2) throw e2;
        datosFlashcards = tarjetas || [];
        progresoFlashcards = {};
        for (const p of progreso || []) progresoFlashcards[p.flashcard_id] = { calificacion: p.calificacion, proxima_revision: p.proxima_revision };
      } catch (e) {
        datosFlashcards = [];
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // MODELO: ALTERNATIVAS (nuevo — MC puro, feedback solo si se falla)
    // ══════════════════════════════════════════════════════════════════
    let altFiltradas = [];
    let altIndice = 0;
    let altCompletados = 0;
    let altCorrectas = 0;

    async function iniciarAlternativasModelo() {
      document.getElementById('practica-container').innerHTML = `<div class="estado-vacio"><div class="spinner"></div>Cargando alternativas…</div>`;
      if (datosAlternativas.length === 0) await cargarAlternativas();
      altFiltradas = datosAlternativas.filter(it => {
        if (areaActiva !== 'todas' && normalizarMateria(it.materia) !== areaActiva) return false;
        if (subtipoActivo !== 'todos' && it.subtema !== subtipoActivo) return false;
        return true;
      });
      altFiltradas.sort((a, b) => (a.nivel_exigencia || 3) - (b.nivel_exigencia || 3) || Math.random() - 0.5);
      altIndice = 0; altCompletados = 0; altCorrectas = 0;
      renderAlternativa();
    }

    async function cargarAlternativas() {
      try {
        const { data, error } = await sb.from('alternativas').select('id,materia,subtema,nivel_exigencia,pregunta,opciones,correcta,retroalimentacion,fuente').eq('publicado', true);
        if (error) throw error;
        datosAlternativas = data || [];
      } catch (e) { datosAlternativas = []; }
    }

    function renderAlternativa() {
      const cont = document.getElementById('practica-container');
      if (altFiltradas.length === 0) {
        cont.innerHTML = `<div class="estado-vacio">No hay ítems de Alternativas para esta combinación de filtros todavía.</div>`;
        return;
      }
      if (altIndice >= altFiltradas.length) {
        const pct = altCompletados > 0 ? Math.round((altCorrectas / altCompletados) * 100) : 0;
        cont.innerHTML = `
          <div class="results-card">
            <div class="results-emoji">${pct >= 75 ? '🏆' : pct >= 50 ? '💪' : '📚'}</div>
            <div class="results-title">Sesión de Alternativas completa</div>
            <div class="results-score">${pct}%</div>
            <div class="results-detail">${altCorrectas} de ${altCompletados} correctas</div>
            <button class="btn btn-primary" onclick="iniciarAlternativasModelo()">Nueva sesión</button>
          </div>`;
        return;
      }
      const item = altFiltradas[altIndice];
      const pct = Math.round((altIndice / altFiltradas.length) * 100);
      cont.innerHTML = `
        <div class="quiz-progress">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${altIndice + 1} / ${altFiltradas.length}</span>
        </div>
        <div class="item-card">
          <div class="item-meta">
            <span class="badge-tipo badge-mc">Alternativas</span>
            <span class="badge-materia">${item.subtema || ''}</span>
            <span class="item-num">N${item.nivel_exigencia || '-'}</span>
          </div>
          <div class="pregunta-text">${escaparHtmlBase(item.pregunta)}</div>
          <div class="options-grid" id="alt-options">
            ${item.opciones.map((op, i) => `
              <button class="option-btn" id="alt-opt-${i}" onclick="seleccionarAlternativa(${i})">
                <span class="option-letter">${['A','B','C','D'][i]}</span><span>${escaparHtmlBase(op)}</span>
              </button>`).join('')}
          </div>
          <div id="alt-feedback"></div>
        </div>`;
    }

    function seleccionarAlternativa(idx) {
      const item = altFiltradas[altIndice];
      const botones = document.querySelectorAll('#alt-options .option-btn');
      if (botones[0].disabled) return; // ya se contestó este ítem
      botones.forEach(b => b.disabled = true);
      const esCorrecta = idx === item.correcta;
      altCompletados++;
      if (esCorrecta) altCorrectas++;

      botones[idx].classList.add(esCorrecta ? 'selected' : 'wrong');
      if (!esCorrecta) botones[item.correcta].classList.add('revealed');
      else botones[idx].classList.add('correct');

      let feedbackHtml = '';
      if (!esCorrecta) {
        const letras = ['A', 'B', 'C', 'D'];
        const razon = (item.retroalimentacion.por_que_no || []).find(r => r.trim().startsWith(letras[idx] + ':'));
        feedbackHtml = `
          <div class="distractor-feedback">
            <strong>La correcta era ${letras[item.correcta]}.</strong> ${escaparHtmlBase(item.retroalimentacion.correcta || '')}
            ${razon ? `<br><br>${escaparHtmlBase(razon)}` : ''}
          </div>`;
      }
      feedbackHtml += `
        <div class="btn-row" style="margin-top:1rem;">
          <button class="btn btn-dark" onclick="siguienteAlternativa()">${altIndice < altFiltradas.length - 1 ? 'Siguiente ítem →' : 'Ver resultados →'}</button>
        </div>`;
      document.getElementById('alt-feedback').innerHTML = feedbackHtml;
    }

    function siguienteAlternativa() { altIndice++; renderAlternativa(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // ══════════════════════════════════════════════════════════════════
    // MODELO: MEMORICE — dos métodos en paralelo (A/B)
    // ══════════════════════════════════════════════════════════════════
    let memCola = [];
    let memIndice = 0;
    let memCompletados = 0;
    let metodoMemorice = localStorage.getItem('digesto_metodo_memorice') || 'A';
    let memTiempoMostrado = null; // para segundos_hasta_evaluar
    let memPendienteAbandono = null; // {articuloId, metodo, nivel} del item mostrado sin evaluar aún

    function claveProgreso(articuloId, metodo) { return `${articuloId}::${metodo}`; }

    function setMetodoMemorice(m) {
      metodoMemorice = m;
      localStorage.setItem('digesto_metodo_memorice', m);
      registrarAbandonoPendiente();
      renderFilaSubtipo();
      iniciarMemoriceModelo();
    }

    async function iniciarMemoriceModelo() {
      document.getElementById('practica-container').innerHTML = `<div class="estado-vacio"><div class="spinner"></div>Cargando Memorice…</div>`;
      if (datosMemoriceArticulos.length === 0) await cargarMemorice();
      const ahora = new Date();
      memCola = datosMemoriceArticulos.filter(a => {
        if (areaActiva !== 'todas' && normalizarMateria(a.materia) !== areaActiva) return false;
        if (subtipoActivo !== 'todos' && a.subtema !== subtipoActivo) return false;
        const p = progresoMemorice[claveProgreso(a.id, metodoMemorice)];
        if (!p || !p.proxima_revision) return true;
        return new Date(p.proxima_revision) <= ahora;
      }).map(a => ({ ...a }));
      memCola.sort(() => Math.random() - 0.5);
      memIndice = 0; memCompletados = 0;
      renderMemorice();
    }

    async function cargarMemorice() {
      try {
        const [{ data: articulos, error: e1 }, { data: progreso, error: e2 }] = await Promise.all([
          sb.from('memorice_articulos').select('id,materia,subtema,articulo,texto,clausulas,prioridad_ocultamiento,palabras_criticas,fuente').eq('publicado', true),
          sb.from('memorice_progreso').select('articulo_id,metodo,nivel_actual,estado,proxima_revision,historial,aciertos_nivel_max,sesiones_con_acierto').eq('user_id', usuarioId),
        ]);
        if (e1) throw e1;
        if (e2) throw e2;
        datosMemoriceArticulos = articulos || [];
        progresoMemorice = {};
        for (const p of progreso || []) progresoMemorice[claveProgreso(p.articulo_id, p.metodo || 'A')] = p;
      } catch (e) {
        datosMemoriceArticulos = [];
      }
    }

    // ── Método B: cláusulas y clave de primera letra ─────────────────────
    function derivarClausulas(articulo) {
      if (articulo.clausulas && articulo.clausulas.length > 0) return articulo.clausulas;
      const texto = articulo.texto;
      if (texto.includes(';')) {
        const partes = texto.split(';').map(s => s.trim()).filter(Boolean);
        if (partes.length >= 2) return partes.map((s, i) => i < partes.length - 1 ? s + ';' : s);
      }
      const partesIncisos = texto.split(/(?=\d+[°º]\.\s)/).map(s => s.trim()).filter(Boolean);
      if (partesIncisos.length >= 2) return partesIncisos;
      return [texto];
    }

    // Primera letra + un "_" por cada carácter restante de cada palabra.
    // Se conserva puntuación, espacios y mayúsculas (no se tocan, solo se
    // reemplazan las letras). Automático, sin curaduría manual.
    function generarClave(texto) {
      return texto.replace(/\p{L}+/gu, (palabra) => palabra[0] + '_'.repeat(palabra.length - 1));
    }

    // nivel máximo siempre es 4 (N4 en A, B4 en B) en ambos métodos.
    function memSiguienteNivel(articulo, metodo, nivelActual) {
      if (metodo === 'A') return Math.min(4, nivelActual + 1);
      const clausulas = derivarClausulas(articulo);
      if (clausulas.length <= 1 && nivelActual === 1) return 4; // articulo de una sola clausula: Estudio -> clave -> blanco
      return Math.min(4, nivelActual + 1);
    }
    function memNivelAnterior(articulo, metodo, nivelActual) {
      if (metodo === 'A') return Math.max(1, nivelActual - 1);
      const clausulas = derivarClausulas(articulo);
      if (clausulas.length <= 1 && nivelActual === 4) return 1;
      return Math.max(1, nivelActual - 1);
    }

    function renderMemorice() {
      const cont = document.getElementById('practica-container');
      if (memCola.length === 0) {
        cont.innerHTML = `<div class="estado-vacio">No hay artículos de Memorice pendientes de repaso hoy en esta combinación de filtros.</div>`;
        return;
      }
      if (memIndice >= memCola.length) {
        cont.innerHTML = `
          <div class="results-card">
            <div class="results-emoji">🏆</div>
            <div class="results-title">Sesión de Memorice completa</div>
            <div class="results-detail">${memCompletados} artículos repasados — Método ${metodoMemorice}</div>
            <button class="btn btn-primary" onclick="iniciarMemoriceModelo()">Nueva sesión</button>
          </div>`;
        return;
      }
      const articulo = memCola[memIndice];
      const key = claveProgreso(articulo.id, metodoMemorice);
      const progresoItem = progresoMemorice[key];
      const pct = Math.round((memIndice / memCola.length) * 100);

      let cuerpoHtml, botonHtml, faseLabel;

      if (metodoMemorice === 'A') {
        const nivel = progresoItem && progresoItem.nivel_actual ? progresoItem.nivel_actual : 1;
        faseLabel = `N${nivel}`;
        if (nivel >= 4) {
          cuerpoHtml = `
            <div class="mem-fuente">${escaparHtmlBase(articulo.fuente || '')}</div>
            <textarea id="mem-textarea" class="mem-textarea-n4" placeholder="Escribe el artículo completo, de memoria…" onpaste="return false;" ondrop="return false;"></textarea>`;
        } else {
          const { partes } = construirBlanks(articulo, nivel);
          let inputIdx = 0;
          const html = partes.map(p => {
            if (p.tipo === 'texto') return escaparHtmlBase(p.texto);
            const w = Math.max(3, p.esperado.length + 1);
            const htmlBlank = `<input class="mem-blank-input" id="mem-blank-${inputIdx}" data-esperado="${escaparHtmlBase(p.esperado)}" style="width:${w}ch" autocomplete="off" onpaste="return false;" ondrop="return false;" />`;
            inputIdx++;
            return htmlBlank;
          }).join('');
          cuerpoHtml = `
            <div class="mem-fuente">${escaparHtmlBase(articulo.fuente || '')}</div>
            <div class="mem-articulo-texto">${html}</div>`;
        }
        botonHtml = `<button class="btn btn-primary" id="mem-btn-evaluar" onclick="evaluarMemorice()">Evaluar mi respuesta</button>`;
      } else {
        // Método B
        if (!progresoItem) {
          faseLabel = 'Estudio';
          cuerpoHtml = `
            <div class="mem-fuente">${escaparHtmlBase(articulo.fuente || '')}</div>
            <div class="mem-articulo-texto">${escaparHtmlBase(articulo.texto)}</div>
            <div class="justificacion-label">Escríbelo una vez, copiándolo (esto ayuda a fijarlo antes de practicar sin apoyo):</div>
            <textarea id="mem-textarea-estudio" placeholder="Copia el artículo completo…" onpaste="return false;" ondrop="return false;"></textarea>`;
          botonHtml = `<button class="btn btn-primary" id="mem-btn-evaluar" onclick="continuarEstudioMemorice()">Continuar →</button>`;
        } else {
          const nivel = progresoItem.nivel_actual || 1;
          if (nivel >= 4) {
            faseLabel = 'B4';
            cuerpoHtml = `
              <div class="mem-fuente">${escaparHtmlBase(articulo.fuente || '')}</div>
              <textarea id="mem-textarea" class="mem-textarea-n4" placeholder="Escribe el artículo completo, de memoria, sin ningún apoyo…" onpaste="return false;" ondrop="return false;"></textarea>`;
          } else {
            faseLabel = `B${nivel}`;
            const clausulas = derivarClausulas(articulo);
            const cantidad = clausulas.length <= 1 ? 1 : Math.min(nivel, clausulas.length);
            const textoAcumulado = clausulas.slice(0, cantidad).join(' ');
            const clave = generarClave(textoAcumulado);
            cuerpoHtml = `
              <div class="mem-fuente">${escaparHtmlBase(articulo.fuente || '')}</div>
              <div class="mem-clave-texto">${escaparHtmlBase(clave)}</div>
              <textarea id="mem-textarea-b" placeholder="Reconstruye el texto completo a partir de la clave…" onpaste="return false;" ondrop="return false;"></textarea>`;
          }
          botonHtml = `<button class="btn btn-primary" id="mem-btn-evaluar" onclick="evaluarMemorice()">Evaluar mi respuesta</button>`;
        }
      }

      cont.innerHTML = `
        <div class="quiz-progress">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${memIndice + 1} / ${memCola.length}</span>
        </div>
        <div class="item-card">
          <div class="item-meta">
            <span class="badge-tipo badge-memorice">Memorice · Método ${metodoMemorice}</span>
            <span class="mem-nivel-badge">${faseLabel}</span>
            <span class="badge-materia">${articulo.subtema || ''}</span>
          </div>
          <div class="mem-articulo-numero">
            <label for="mem-articulo-num">N° de artículo:</label>
            <input type="text" id="mem-articulo-num" placeholder="Ej: 1489" autocomplete="off" onpaste="return false;" ondrop="return false;" />
          </div>
          ${cuerpoHtml}
          <div class="btn-row">${botonHtml}</div>
          <div id="mem-feedback"></div>
        </div>`;

      memTiempoMostrado = Date.now();
      memPendienteAbandono = { articuloId: articulo.id, metodo: metodoMemorice, nivel: progresoItem ? (progresoItem.nivel_actual || 1) : 0 };
    }

    function continuarEstudioMemorice() {
      const articulo = memCola[memIndice];
      const key = claveProgreso(articulo.id, metodoMemorice);
      progresoMemorice[key] = { nivel_actual: 1, estado: 'parcial', proxima_revision: new Date().toISOString(), historial: [], aciertos_nivel_max: 0, sesiones_con_acierto: [] };
      memPendienteAbandono = null;
      renderMemorice();
    }

    function evaluarMemorice() {
      const articulo = memCola[memIndice];
      const key = claveProgreso(articulo.id, metodoMemorice);
      const progresoItem = progresoMemorice[key] || { nivel_actual: 1, aciertos_nivel_max: 0, sesiones_con_acierto: [] };
      const nivel = progresoItem.nivel_actual || 1;
      const segundosHastaEvaluar = memTiempoMostrado ? (Date.now() - memTiempoMostrado) / 1000 : null;
      document.getElementById('mem-btn-evaluar').disabled = true;

      const inputNumero = document.getElementById('mem-articulo-num');
      const numeroEscrito = inputNumero ? inputNumero.value : '';
      const numeroCorrecto = normalizarNumeroArticulo(numeroEscrito) === normalizarNumeroArticulo(articulo.articulo);
      if (inputNumero) { inputNumero.disabled = true; inputNumero.classList.add(numeroCorrecto ? 'mem-ok' : 'mem-mal'); }

      let resultado; // 'correcto' | 'parcial' | 'incorrecto'
      let explicaciones = [];
      let porcentajeAcertado = 0;
      let erroresCriticas = 0;
      const esNivelMaximo = nivel >= 4;

      if (esNivelMaximo) {
        const escrito = document.getElementById('mem-textarea').value;
        const diff = diffCompleto(articulo.texto, escrito, articulo.palabras_criticas || []);
        const diffHtml = diff.items.map(it => {
          if (it.tipo === 'ok') return `<span class="mem-diff-ok">${escaparHtmlBase(it.palabra)}</span>`;
          if (it.tipo === 'falta') return `<span class="mem-diff-falta ${it.critica ? 'mem-diff-critica' : ''}">${escaparHtmlBase(it.palabra)}</span>`;
          return `<span class="mem-diff-sobra">${escaparHtmlBase(it.palabra)}</span>`;
        }).join(' ');
        document.querySelector('.mem-textarea-n4').outerHTML = `<div class="mem-diff-linea">${diffHtml}</div>`;

        if (diff.correcto) resultado = 'correcto';
        else if (diff.okCount === 0) resultado = 'incorrecto';
        else resultado = 'parcial';
        porcentajeAcertado = diff.totalEsperadas > 0 ? diff.okCount / diff.totalEsperadas : 1;
        erroresCriticas = diff.items.filter(it => it.tipo === 'falta' && it.critica).length;

        if (!diff.correcto) {
          diff.items.filter(it => it.tipo === 'falta').forEach(it => {
            explicaciones.push(`Faltó "<strong>${escaparHtmlBase(it.palabra)}</strong>"${it.critica ? ' — es una palabra clave: cambia el sentido de la regla.' : '.'}`);
          });
          diff.items.filter(it => it.tipo === 'sobra').forEach(it => {
            explicaciones.push(`Sobra "<strong>${escaparHtmlBase(it.palabra)}</strong>" respecto del texto del artículo.`);
          });
        }
      } else if (metodoMemorice === 'A') {
        const inputs = document.querySelectorAll('.mem-blank-input');
        let correctos = 0;
        inputs.forEach(inp => {
          const esperado = inp.getAttribute('data-esperado');
          const escrito = inp.value;
          const r = compararBlank(esperado, escrito, articulo.palabras_criticas || []);
          inp.classList.add(r.correcto ? 'mem-ok' : 'mem-mal');
          inp.disabled = true;
          if (r.correcto) { correctos++; }
          else {
            inp.insertAdjacentHTML('afterend', `<span class="mem-correccion">(${escaparHtmlBase(esperado)})</span>`);
            explicaciones.push(`En vez de "<strong>${escaparHtmlBase(escrito) || '(en blanco)'}</strong>" iba "<strong>${escaparHtmlBase(esperado)}</strong>".`);
            if ((articulo.palabras_criticas || []).some(c => normalizarPalabra(c) === normalizarPalabra(esperado.split(' ')[0]))) erroresCriticas++;
          }
        });
        porcentajeAcertado = inputs.length > 0 ? correctos / inputs.length : 1;
        if (correctos === inputs.length) resultado = 'correcto';
        else if (correctos === 0) resultado = 'incorrecto';
        else resultado = 'parcial';
      } else {
        // Método B, niveles B1-B3: texto libre contra las cláusulas acumuladas
        const clausulas = derivarClausulas(articulo);
        const cantidad = clausulas.length <= 1 ? 1 : Math.min(nivel, clausulas.length);
        const textoEsperado = clausulas.slice(0, cantidad).join(' ');
        const escrito = document.getElementById('mem-textarea-b').value;
        const diff = diffCompleto(textoEsperado, escrito, articulo.palabras_criticas || []);
        const diffHtml = diff.items.map(it => {
          if (it.tipo === 'ok') return `<span class="mem-diff-ok">${escaparHtmlBase(it.palabra)}</span>`;
          if (it.tipo === 'falta') return `<span class="mem-diff-falta ${it.critica ? 'mem-diff-critica' : ''}">${escaparHtmlBase(it.palabra)}</span>`;
          return `<span class="mem-diff-sobra">${escaparHtmlBase(it.palabra)}</span>`;
        }).join(' ');
        document.getElementById('mem-textarea-b').outerHTML = `<div class="mem-diff-linea">${diffHtml}</div>`;

        if (diff.correcto) resultado = 'correcto';
        else if (diff.okCount === 0) resultado = 'incorrecto';
        else resultado = 'parcial';
        porcentajeAcertado = diff.totalEsperadas > 0 ? diff.okCount / diff.totalEsperadas : 1;
        erroresCriticas = diff.items.filter(it => it.tipo === 'falta' && it.critica).length;

        if (!diff.correcto) {
          diff.items.filter(it => it.tipo === 'falta').forEach(it => {
            explicaciones.push(`Faltó "<strong>${escaparHtmlBase(it.palabra)}</strong>"${it.critica ? ' — es una palabra clave: cambia el sentido de la regla.' : '.'}`);
          });
          diff.items.filter(it => it.tipo === 'sobra').forEach(it => {
            explicaciones.push(`Sobra "<strong>${escaparHtmlBase(it.palabra)}</strong>" respecto del texto esperado.`);
          });
        }
      }

      // El número de artículo es parte de lo que hay que memorizar, no un
      // dato regalado: si se escribe mal, nunca se cuenta como "correcto"
      // completo, aunque el texto esté perfecto (se degrada a "parcial").
      if (!numeroCorrecto) {
        explicaciones.unshift(`El número de artículo no era correcto: escribiste "<strong>${escaparHtmlBase(numeroEscrito) || '(en blanco)'}</strong>", era el <strong>art. ${escaparHtmlBase(articulo.articulo)}</strong>.`);
        if (resultado === 'correcto') resultado = 'parcial';
      }

      // ── Transición de nivel + repetición espaciada (regla de 3 sesiones) ──
      let nivelNuevo, dias, dominado = false;
      let aciertosNuevo = progresoItem.aciertos_nivel_max || 0;
      let sesionesNuevo = progresoItem.sesiones_con_acierto || [];

      if (resultado === 'correcto') {
        if (esNivelMaximo) {
          nivelNuevo = 4;
          const hoy = new Date().toISOString().slice(0, 10);
          if (!sesionesNuevo.includes(hoy)) sesionesNuevo = [...sesionesNuevo, hoy];
          aciertosNuevo = sesionesNuevo.length;
          if (aciertosNuevo >= 3) { dias = 30; dominado = true; }
          else { dias = 7; }
        } else {
          nivelNuevo = memSiguienteNivel(articulo, metodoMemorice, nivel);
          dias = 7;
        }
      } else if (resultado === 'parcial') {
        nivelNuevo = nivel; dias = 3;
      } else {
        nivelNuevo = memNivelAnterior(articulo, metodoMemorice, nivel); dias = 0;
      }

      guardarProgresoMemorice(articulo.id, metodoMemorice, nivelNuevo, resultado, dias, aciertosNuevo, sesionesNuevo);
      registrarIntentoMemorice(articulo.id, metodoMemorice, nivel, resultado, porcentajeAcertado, erroresCriticas, segundosHastaEvaluar);
      memCompletados++;
      memPendienteAbandono = null;

      if (resultado === 'incorrecto') {
        memCola.push({ ...articulo }); // se reencola al final de la cola real; no se agrupan intentos del mismo articulo
      }

      const badgeLabel = {
        correcto: dominado ? '✓ Dominado (3 sesiones distintas) — próximo repaso en 30 días'
          : (esNivelMaximo ? `✓ Correcto — ${aciertosNuevo}/3 sesiones para dominarlo` : '✓ Todo correcto — sube de nivel'),
        parcial: '◐ Parcial — se mantiene en este nivel',
        incorrecto: '✗ A repasar — baja de nivel y vuelve más tarde en esta sesión',
      }[resultado];

      document.getElementById('mem-feedback').innerHTML = `
        <div class="mem-resultado-badge ${resultado}">${badgeLabel}</div>
        ${explicaciones.length > 0 ? `<div class="mem-explicacion"><ul>${explicaciones.map(e => `<li>${e}</li>`).join('')}</ul></div>` : ''}
        <div class="btn-row" style="margin-top:1rem;">
          <button class="btn btn-dark" onclick="siguienteMemorice()">${memIndice < memCola.length - 1 ? 'Siguiente ítem →' : 'Ver resultados →'}</button>
        </div>`;
    }

    async function guardarProgresoMemorice(articuloId, metodo, nivelNuevo, estado, dias, aciertosNivelMax, sesionesConAcierto) {
      const proxima = sumarDias(dias);
      const key = claveProgreso(articuloId, metodo);
      const historialPrevio = (progresoMemorice[key] && progresoMemorice[key].historial) || [];
      const historial = [...historialPrevio, { fecha: new Date().toISOString(), nivel: nivelNuevo, resultado: estado }].slice(-20);
      progresoMemorice[key] = { nivel_actual: nivelNuevo, estado, proxima_revision: proxima, historial, aciertos_nivel_max: aciertosNivelMax, sesiones_con_acierto: sesionesConAcierto };
      try {
        await sb.from('memorice_progreso').upsert(
          { user_id: usuarioId, articulo_id: articuloId, metodo, nivel_actual: nivelNuevo, estado, ultima_revision: new Date().toISOString(), proxima_revision: proxima, historial, aciertos_nivel_max: aciertosNivelMax, sesiones_con_acierto: sesionesConAcierto },
          { onConflict: 'user_id,articulo_id,metodo' }
        );
      } catch (e) { /* no bloquea el estudio */ }
    }

    async function registrarIntentoMemorice(articuloId, metodo, nivel, resultado, porcentaje, erroresCriticas, segundos) {
      try {
        await sb.from('memorice_intentos').insert({
          user_id: usuarioId, articulo_id: articuloId, metodo, nivel, resultado,
          porcentaje_vacios_acertados: porcentaje, errores_en_palabras_criticas: erroresCriticas,
          segundos_hasta_evaluar: segundos, abandono: false,
        });
      } catch (e) { /* la instrumentación nunca debe bloquear el estudio */ }
    }

    function registrarAbandonoPendiente() {
      if (!memPendienteAbandono) return;
      const { articuloId, metodo, nivel } = memPendienteAbandono;
      memPendienteAbandono = null;
      sb.from('memorice_intentos').insert({
        user_id: usuarioId, articulo_id: articuloId, metodo, nivel, resultado: 'incorrecto',
        errores_en_palabras_criticas: 0, abandono: true,
      }).then(() => {}, () => {});
    }

    document.addEventListener('visibilitychange', () => { if (document.hidden) registrarAbandonoPendiente(); });
    window.addEventListener('beforeunload', () => { registrarAbandonoPendiente(); });

    function siguienteMemorice() { memIndice++; renderMemorice(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // ══════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════
    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'auth.html'; return; }
      usuarioId = user.id;
      const name = user.user_metadata?.full_name || user.email.split('@')[0];
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-avatar').textContent = name[0].toUpperCase();

      const modeloUrl = new URLSearchParams(window.location.search).get('modelo');
      if (MODELOS.some(m => m.id === modeloUrl)) modeloActivo = modeloUrl;

      renderFiltros();
      iniciarSesion();
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '../index.html';
    }

    init();
  </script>
