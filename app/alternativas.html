<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digesto — Práctica</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5EAD4;
      color: #111111;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #E8D8B8;
      margin-bottom: 3rem;
      text-decoration: none;
    }
    .sidebar-logo span { color: #C41E2E; }
    .nav-section {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,216,184,0.3);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 7px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(232,216,184,0.55);
      transition: all 0.15s;
      margin-bottom: 0.2rem;
    }
    .nav-item:hover { background: rgba(232,216,184,0.06); color: #E8D8B8; }
    .nav-item.active { background: rgba(196,30,46,0.15); color: #E8D8B8; }
    .nav-item.active .nav-icon { color: #C41E2E; }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      font-size: 0.65rem;
      background: rgba(196,30,46,0.2);
      color: #C41E2E;
      padding: 0.1rem 0.45rem;
      border-radius: 100px;
      font-weight: 600;
    }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(232,216,184,0.08);
    }
    .user-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .user-avatar {
      width: 36px; height: 36px;
      background: #C41E2E;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #F5EAD4;
      flex-shrink: 0;
    }
    .user-name { font-size: 0.82rem; font-weight: 600; color: #E8D8B8; }
    .user-plan { font-size: 0.72rem; color: rgba(232,216,184,0.4); }
    .btn-logout {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px solid rgba(232,216,184,0.12);
      border-radius: 6px;
      color: rgba(232,216,184,0.4);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: rgba(196,30,46,0.3); color: #C41E2E; }

    /* ── MAIN ── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 2.5rem 3rem;
      max-width: calc(100% - 240px);
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #111111;
      line-height: 1;
    }
    .page-subtitle { font-size: 0.875rem; color: #7A6E5F; margin-top: 0.3rem; }

    /* FILTROS — tres ejes: Materia / Modelo / Subtipo */
    .ejes-filtros { margin-bottom: 1.75rem; }
    .eje-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .eje-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      width: 82px;
      flex-shrink: 0;
    }
    .filtro-btn {
      padding: 0.45rem 1rem;
      border-radius: 100px;
      border: 1.5px solid rgba(17,17,17,0.15);
      background: transparent;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      color: #7A6E5F;
      transition: all 0.15s;
    }
    .filtro-btn:hover { border-color: #111111; color: #111111; }
    .filtro-btn.active { background: #111111; color: #E8D8B8; border-color: #111111; }
    .eje-row.subtipo .filtro-btn.active { background: #C41E2E; border-color: #C41E2E; }
    .filtro-btn.disabled { cursor: default; opacity: 0.4; border-style: dashed; }
    .filtro-btn.disabled:hover { border-color: rgba(17,17,17,0.15); color: #7A6E5F; }

    /* ── PROGRESO ── */
    .quiz-progress {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .progress-bar-bg {
      flex: 1;
      height: 5px;
      background: rgba(17,17,17,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #C41E2E;
      border-radius: 100px;
      transition: width 0.5s ease;
    }
    .progress-text { font-size: 0.8rem; font-weight: 600; color: #7A6E5F; white-space: nowrap; }

    /* ── TARJETA DE ÍTEM (Evaluación / Alternativas / Memorice) ── */
    .item-card {
      background: #E8D8B8;
      border-radius: 12px;
      padding: 2rem;
      max-width: 780px;
      margin-bottom: 1.25rem;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .badge-tipo {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }
    .badge-aplicacion { background: rgba(196,30,46,0.12); color: #C41E2E; }
    .badge-deteccion  { background: rgba(180,100,0,0.12); color: #A05000; }
    .badge-justificacion { background: rgba(30,130,80,0.12); color: #0F6040; }
    .badge-mc         { background: rgba(50,80,180,0.12); color: #283880; }
    .badge-memorice   { background: rgba(120,60,170,0.12); color: #5A2E8C; }

    .badge-materia {
      font-size: 0.7rem;
      font-weight: 600;
      color: #7A6E5F;
    }

    .item-num {
      margin-left: auto;
      font-size: 0.75rem;
      color: #7A6E5F;
    }

    .caso-box {
      background: #F5EAD4;
      border-left: 3px solid #C41E2E;
      border-radius: 0 8px 8px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #2A2A2A;
    }
    .caso-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C41E2E;
      display: block;
      margin-bottom: 0.4rem;
    }

    .pregunta-text {
      font-size: 1rem;
      font-weight: 600;
      color: #111111;
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }

    /* ── STEP 1: RECALL LIBRE (Evaluación) ── */
    .step-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .step-num-badge {
      width: 20px; height: 20px;
      background: #111111;
      color: #E8D8B8;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 0.9rem 1rem;
      border: 1.5px solid rgba(17,17,17,0.15);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      line-height: 1.65;
      background: #F5EAD4;
      color: #111111;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #C41E2E; }
    textarea::placeholder { color: #B0A898; }

    .char-count {
      font-size: 0.72rem;
      color: #7A6E5F;
      text-align: right;
      margin-top: 0.35rem;
    }
    .recall-hint {
      font-size: 0.85rem;
      color: #C41E2E;
      text-align: right;
      margin-top: 0.25rem;
      min-height: 1.1em;
    }

    /* ── BOTONES ── */
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #C41E2E; color: #F5EAD4; }
    .btn-primary:hover { background: #E02535; }
    .btn-dark { background: #111111; color: #E8D8B8; }
    .btn-dark:hover { background: #2A2A2A; }
    .btn-outline {
      background: transparent;
      color: #111111;
      border: 1.5px solid rgba(17,17,17,0.2);
    }
    .btn-outline:hover { background: rgba(17,17,17,0.05); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── FEEDBACK DIAGNÓSTICO (Evaluación) ── */
    .feedback-panel {
      background: #F5EAD4;
      border-radius: 10px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(17,17,17,0.08);
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .credito-bar-wrap { flex: 1; }
    .credito-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A6E5F;
      margin-bottom: 0.35rem;
    }
    .credito-bar-bg {
      height: 8px;
      background: rgba(17,17,17,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .credito-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.6s ease;
    }
    .credito-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      line-height: 1;
      flex-shrink: 0;
    }

    .veredicto {
      font-size: 0.9rem;
      font-weight: 600;
      color: #111111;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 7px;
      background: rgba(17,17,17,0.04);
    }

    .elementos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .elementos-col h4 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .elementos-col.ok h4 { color: #1A7A40; }
    .elementos-col.faltan h4 { color: #C41E2E; }
    .elementos-col.faltan .dot { background: #C41E2E; }

    .elemento-tag {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      font-size: 0.8rem;
      line-height: 1.45;
      margin-bottom: 0.5rem;
      color: #2A2A2A;
    }
    .elemento-tag .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .elementos-col.ok .dot { background: #1A7A40; }

    .confusion-box {
      background: rgba(196,30,46,0.06);
      border: 1px solid rgba(196,30,46,0.15);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
    }
    .confusion-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C41E2E;
      margin-bottom: 0.3rem;
    }
    .confusion-text { font-size: 0.85rem; color: #2A2A2A; line-height: 1.55; }

    .feedback-diag {
      font-size: 0.875rem;
      color: #3A3A3A;
      line-height: 1.7;
    }

    /* ── MC SECTION (compartida: discriminación dentro de Evaluación, y modelo Alternativas) ── */
    .mc-section { margin-top: 1.5rem; }
    .mc-intro {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      border: 1.5px solid rgba(17,17,17,0.12);
      background: #F5EAD4;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      color: #111111;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.5;
    }
    .option-btn:hover:not(:disabled) { border-color: #111111; background: #EDE0C8; }
    .option-btn:disabled { cursor: default; }
    .option-btn.selected { border-color: #111111; background: #E0D0B0; }
    .option-btn.correct { background: rgba(34,139,34,0.07); border-color: #228B22; }
    .option-btn.wrong { background: rgba(196,30,46,0.07); border-color: #C41E2E; }
    .option-btn.revealed { background: rgba(34,139,34,0.04); border-color: rgba(34,139,34,0.25); }

    .option-letter {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(17,17,17,0.08);
      font-size: 0.72rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .option-btn.correct .option-letter { background: #228B22; color: white; }
    .option-btn.wrong .option-letter { background: #C41E2E; color: white; }
    .option-btn.revealed .option-letter { background: rgba(34,139,34,0.2); color: #228B22; }

    .justificacion-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #7A6E5F;
      margin-bottom: 0.4rem;
      margin-top: 0.75rem;
    }
    textarea.justificacion {
      min-height: 60px;
      font-size: 0.85rem;
    }

    .distractor-feedback {
      background: rgba(17,17,17,0.04);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #3A3A3A;
      line-height: 1.6;
    }
    .distractor-feedback strong { color: #111111; }

    /* ── RESPUESTA MODELO ── */
    .modelo-section {
      background: #E8D8B8;
      border: 3px solid #111111;
      border-radius: 10px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .modelo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #C41E2E;
      margin-bottom: 1rem;
    }
    .modelo-body {
      font-size: 0.875rem;
      color: #2A2A2A;
      line-height: 1.75;
    }
    .modelo-body p { margin: 0 0 1em 0; }
    .modelo-body p:last-child { margin-bottom: 0; }
    .articulos-ref {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .art-tag {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(196,30,46,0.12);
      color: #A61825;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
    }

    /* ── SEGUNDA PASADA ── */
    .segunda-pasada {
      background: rgba(180,120,0,0.08);
      border: 1px solid rgba(180,120,0,0.2);
      border-radius: 10px;
      padding: 1.25rem;
      margin-top: 1.25rem;
    }
    .segunda-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #A06000;
      margin-bottom: 0.4rem;
    }
    .segunda-text {
      font-size: 0.875rem;
      color: #2A2A2A;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    /* ── RESULTADOS ── */
    .results-card {
      background: #E8D8B8;
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 520px;
    }
    .results-emoji { font-size: 3rem; margin-bottom: 1rem; }
    .results-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #111111;
      margin-bottom: 0.4rem;
    }
    .results-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4.5rem;
      letter-spacing: 2px;
      color: #C41E2E;
      line-height: 1;
      margin: 0.75rem 0;
    }
    .results-detail { font-size: 0.9rem; color: #7A6E5F; margin-bottom: 0.5rem; }
    .results-items-detail {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .estado-vacio {
      text-align: center;
      padding: 3rem 1rem;
      color: #7A6E5F;
      font-size: 0.9rem;
    }
    .spinner {
      width: 26px; height: 26px;
      margin: 0 auto 1rem;
      border: 3px solid rgba(17,17,17,0.1); border-top-color: #C41E2E;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FLASHCARDS (modelo) ── */
    .fc-tarjeta {
      background: #FFFFFF;
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 16px;
      min-height: 260px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      max-width: 720px;
    }
    .fc-dificultad {
      position: absolute; top: 1rem; left: 1rem;
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem; border-radius: 100px;
    }
    .fc-dificultad.basica { background: rgba(26,122,64,0.1); color: #1A7A40; }
    .fc-dificultad.intermedia { background: rgba(196,146,30,0.12); color: #8A6300; }
    .fc-dificultad.avanzada { background: rgba(196,30,46,0.1); color: #A61825; }
    .fc-tema { position: absolute; top: 1rem; right: 1rem; font-size: 0.7rem; color: rgba(17,17,17,0.35); max-width: 55%; text-align: right; }
    .fc-etiqueta { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(17,17,17,0.3); margin-bottom: 0.9rem; }
    .fc-texto { font-size: 1.05rem; line-height: 1.6; color: #111111; }
    .fc-texto b { color: #A61825; }
    .fc-texto .art { font-family: 'SF Mono', Menlo, monospace; font-size: 0.92em; background: rgba(17,17,17,0.06); color: #4A4136; padding: 0.1rem 0.4rem; border-radius: 4px; }
    .fc-pista { margin-top: 1.5rem; font-size: 0.75rem; color: rgba(17,17,17,0.3); }
    .fc-controles { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
    .fc-calificar-fila { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
    .btn-calificar { padding: 0.6rem 1rem; border-radius: 8px; border: 1.5px solid; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; background: #FFFFFF; transition: opacity 0.15s; }
    .btn-calificar:hover { opacity: 0.85; }
    .btn-calificar.bien { border-color: #1A7A40; color: #1A7A40; }
    .btn-calificar.mas_o_menos { border-color: #8A6300; color: #8A6300; }
    .btn-calificar.poco { border-color: #A61825; color: #A61825; }

        respuesta_modelo: 'La tesis tradicional (Alessandri, Claro Solar) sostiene que la indemnización compensatoria no es autónoma: el artículo 1489, al decir que el acreedor puede pedir la resolución o el cumplimiento "con indemnización de perjuicios", muestra que esta es un complemento de una de esas dos acciones, no un remedio independiente. La Corte Suprema adoptó esta tesis en el Rol 1782-2007, de 22 de septiembre de 2008.\n\nLa tesis moderna (Vidal, Pizarro), en cambio, sostiene que la indemnización es un remedio autónomo dentro de un sistema de remedios centrado en el interés del acreedor, no subordinado al cumplimiento ni a la resolución. La Corte Suprema acogió esta tesis en el caso Zorín con Compañía Siderúrgica Huachipato (Rol 3.325-2012, 31 de octubre de 2012), concediendo una indemnización autónoma por la entrega de un producto inútil para el fin previsto.\n\nBoetsch adopta una posición matizada: como regla general, la indemnización compensatoria no es autónoma y debe demandarse junto con el cumplimiento o la resolución. Pero reconoce tres excepciones en que sí puede reclamarse independientemente: la indemnización moratoria (que nunca ha sido controvertida); el cumplimiento imperfecto no resolutorio del artículo 1590 inciso 2°, cuando el acreedor opta por recibir la cosa defectuosa e indemnizarse de los deterioros; y los contratos de tracto sucesivo, donde una prestación ya devengada e irrecuperable solo puede repararse mediante indemnización.\n\nEl debate sigue vivo incluso al interior de la Corte: en el caso Universidad Santo Tomás (Rol 17.108-2013, 18 de noviembre de 2014), que reiteró la autonomía, el ministro Valdés emitió un voto disidente defendiendo la tesis tradicional de la dependencia.',

        respuesta_modelo: 'Inicialmente se sostuvo que el artículo 2329 era solo una repetición, en términos más absolutos, de la regla del artículo 2314, cuya única peculiaridad sería agregar algunos ejemplos. Ducci superó esa lectura, proponiendo que la norma establece una presunción de culpa cuando el daño proviene de actividades peligrosas. Alessandri amplió después esa tesis: el artículo 2329 establecería una presunción de culpabilidad cada vez que el daño provenga de un hecho que, por su naturaleza o circunstancias, sea susceptible de atribuirse a culpa o dolo del agente, y no solo cuando derive de una actividad peligrosa en sentido estricto.\n\nEsta interpretación amplia se sostiene en cuatro argumentos. El primero es exegético: la ubicación del artículo 2329, justo después de las normas que presumen la culpa por el hecho ajeno y por el hecho de las cosas, y su encabezado ("por regla general todo daño..."), sugieren que el legislador quiso establecer una regla de clausura del sistema de presunciones; de lo contrario, sería una repetición innecesaria del artículo 2314. El segundo es textual: la norma habla de daño "que pueda imputarse" a malicia o negligencia, expresión que alude a una conducta que por sí misma tiende a ser negligente, como confirman los propios ejemplos del inciso segundo (disparar un arma de fuego, remover losas de una acequia sin precauciones, mantener en mal estado un puente). El tercero apela a la experiencia y al sentido común, la máxima res ipsa loquitur: se atribuye responsabilidad cuando la experiencia muestra que, en esas circunstancias, el daño usualmente se debe a culpa del que lo causa. El cuarto es de justicia correctiva: la presunción es, con frecuencia, el único camino práctico para construir la responsabilidad en accidentes originados en procesos industriales o de servicios complejos, donde no es posible identificar el acto u omisión concreto que lo provocó.',

io exclusivamente empírico.',
