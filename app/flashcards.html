<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digesto — Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5EAD4;
      color: #111111;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #E8D8B8;
      margin-bottom: 3rem;
      text-decoration: none;
    }

    .sidebar-logo span { color: #C41E2E; }

    .nav-section {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,216,184,0.3);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 7px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(232,216,184,0.55);
      transition: all 0.15s;
      margin-bottom: 0.2rem;
    }

    .nav-item:hover { background: rgba(232,216,184,0.06); color: #E8D8B8; }
    .nav-item.active { background: rgba(196,30,46,0.15); color: #E8D8B8; }
    .nav-item.active .nav-icon { color: #C41E2E; }

    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

    .nav-badge {
      margin-left: auto;
      font-size: 0.65rem;
      background: rgba(196,30,46,0.2);
      color: #C41E2E;
      padding: 0.1rem 0.45rem;
      border-radius: 100px;
      font-weight: 600;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(232,216,184,0.08);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .user-avatar {
      width: 36px; height: 36px;
      background: #C41E2E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #F5EAD4;
      flex-shrink: 0;
    }

    .user-name { font-size: 0.82rem; font-weight: 600; color: #E8D8B8; }
    .user-plan { font-size: 0.72rem; color: rgba(232,216,184,0.4); }

    .btn-logout {
      width: 100%;
      padding: 0.55rem;
      background: transparent;
      border: 1px solid rgba(232,216,184,0.12);
      border-radius: 6px;
      color: rgba(232,216,184,0.4);
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: rgba(196,30,46,0.3); color: #C41E2E; }

    /* ── MAIN ── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    .shell {
      width: 100%;
      max-width: 720px;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 1.5px;
    }

    .materia-note {
      font-size: 0.8rem;
      color: #7A6E5F;
    }

    /* ── FILTROS DE DIFICULTAD ── */
    .filtros {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filtro-chip {
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      border: 1.5px solid rgba(17,17,17,0.12);
      background: #FFFFFF;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4A4136;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filtro-chip.active {
      border-color: #C41E2E;
      background: rgba(196,30,46,0.08);
      color: #A61825;
    }

    /* ── TARJETA ── */
    .progreso {
      font-size: 0.8rem;
      color: #7A6E5F;
      margin-bottom: 0.6rem;
      text-align: center;
    }

    .tarjeta {
      background: #FFFFFF;
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 16px;
      min-height: 260px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .tarjeta-dificultad {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }

    .tarjeta-dificultad.basica { background: rgba(26,122,64,0.1); color: #1A7A40; }
    .tarjeta-dificultad.intermedia { background: rgba(196,146,30,0.12); color: #8A6300; }
    .tarjeta-dificultad.avanzada { background: rgba(196,30,46,0.1); color: #A61825; }

    .tarjeta-tema {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      color: rgba(17,17,17,0.35);
      max-width: 55%;
      text-align: right;
    }

    .tarjeta-etiqueta {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(17,17,17,0.3);
      margin-bottom: 0.9rem;
    }

    .tarjeta-texto {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #111111;
    }

    .tarjeta-texto b { color: #A61825; }

    .tarjeta-pista {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(17,17,17,0.3);
    }

    /* ── CONTROLES ── */
    .controles {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn-control {
      padding: 0.65rem 1.1rem;
      border-radius: 8px;
      border: 1.5px solid rgba(17,17,17,0.12);
      background: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-control:hover:not(:disabled) { border-color: #C41E2E; color: #A61825; }
    .btn-control:disabled { opacity: 0.35; cursor: default; }

    .btn-primario {
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      border: none;
      background: #C41E2E;
      color: #F5EAD4;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primario:hover { opacity: 0.9; }

    .btn-barajar {
      background: none;
      border: none;
      color: #7A6E5F;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 1rem;
    }

    .estado {
      text-align: center;
      padding: 3rem 1rem;
      color: #7A6E5F;
      font-size: 0.9rem;
    }

    .spinner {
      width: 26px; height: 26px;
      margin: 0 auto 1rem;
      border: 3px solid rgba(17,17,17,0.1); border-top-color: #C41E2E;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">Digesto<span>.</span></a>

    <span class="nav-section">Estudio</span>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> Inicio</a>
    <a class="nav-item" href="manuales.html"><span class="nav-icon">📖</span> Manuales</a>
    <a class="nav-item" href="alternativas.html"><span class="nav-icon">✅</span> Alternativas</a>
    <a class="nav-item active" href="flashcards.html"><span class="nav-icon">🃏</span> Flashcards</a>

    <span class="nav-section">Con IA</span>
    <a class="nav-item" href="interrogador.html"><span class="nav-icon">💬</span> Chat IA</a>
    <a class="nav-item" href="#"><span class="nav-icon">🎙️</span> Interrogación oral <span class="nav-badge">Pronto</span></a>

    <span class="nav-section">Comunidad</span>
    <a class="nav-item" href="#"><span class="nav-icon">🏆</span> Liga <span class="nav-badge">Pronto</span></a>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">...</div>
          <div class="user-plan">Plan Esencial</div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Cerrar sesión</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="shell">

      <div class="page-header">
        <div class="page-title">Flashcards</div>
        <div class="materia-note">Responsabilidad contractual</div>
      </div>

      <div id="contenido">
        <div class="estado">
          <div class="spinner"></div>
          Cargando flashcards...
        </div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://byyukzhxhtopojgvgglp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LOJ2usw9g_DuotcjyU3fJw_mQamm4Gq';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let todas = [];
    let filtradas = [];
    let indice = 0;
    let volteada = false;
    let dificultadActiva = 'todas';

    function escaparHtmlBase(texto) {
      return texto.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // La respuesta viene de Airtable con <b> ya incluido (negrita para lo clave).
    // Escapamos todo y solo dejamos pasar <b> y </b>.
    function formatearRespuesta(texto) {
      const seguro = escaparHtmlBase(texto);
      return seguro.replace(/&lt;b&gt;/g, '<b>').replace(/&lt;\/b&gt;/g, '</b>');
    }

    function shuffle(arr) {
      const copia = arr.slice();
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copia[i], copia[j]] = [copia[j], copia[i]];
      }
      return copia;
    }

    function aplicarFiltro() {
      filtradas = dificultadActiva === 'todas'
        ? todas.slice()
        : todas.filter((t) => t.dificultad === dificultadActiva);
      filtradas = shuffle(filtradas);
      indice = 0;
      volteada = false;
      renderTarjeta();
    }

    function elegirDificultad(valor) {
      dificultadActiva = valor;
      document.querySelectorAll('.filtro-chip').forEach((el) => {
        el.classList.toggle('active', el.dataset.valor === valor);
      });
      aplicarFiltro();
    }

    function etiquetaDificultad(d) {
      return { basica: 'Básica', intermedia: 'Intermedia', avanzada: 'Avanzada' }[d] || d;
    }

    function voltear() {
      volteada = !volteada;
      renderTarjeta();
    }

    function siguiente() {
      if (indice < filtradas.length - 1) {
        indice++;
        volteada = false;
        renderTarjeta();
      }
    }

    function anterior() {
      if (indice > 0) {
        indice--;
        volteada = false;
        renderTarjeta();
      }
    }

    function barajarDeNuevo() {
      filtradas = shuffle(filtradas);
      indice = 0;
      volteada = false;
      renderTarjeta();
    }

    function renderTarjeta() {
      const cont = document.getElementById('contenido');

      if (filtradas.length === 0) {
        cont.innerHTML = '<div class="estado">No hay flashcards para esta dificultad todavía.</div>';
        return;
      }

      const t = filtradas[indice];
      const temaHtml = t.tema ? `<div class="tarjeta-tema">${escaparHtmlBase(t.tema)}</div>` : '';

      cont.innerHTML = `
        <div class="filtros" id="filtros"></div>
        <div class="progreso">Tarjeta ${indice + 1} de ${filtradas.length}</div>
        <div class="tarjeta" onclick="voltear()">
          <div class="tarjeta-dificultad ${t.dificultad}">${etiquetaDificultad(t.dificultad)}</div>
          ${temaHtml}
          <div class="tarjeta-etiqueta">${volteada ? 'Respuesta' : 'Pregunta'}</div>
          <div class="tarjeta-texto">${volteada ? formatearRespuesta(t.respuesta) : escaparHtmlBase(t.pregunta)}</div>
          <div class="tarjeta-pista">${volteada ? 'Click para ver la pregunta' : 'Click para ver la respuesta'}</div>
        </div>
        <div class="controles">
          <button class="btn-control" onclick="anterior()" ${indice === 0 ? 'disabled' : ''}>← Anterior</button>
          <button class="btn-primario" onclick="siguiente()" ${indice === filtradas.length - 1 ? 'disabled' : ''}>Siguiente →</button>
        </div>
        <div style="text-align:center;">
          <button class="btn-barajar" onclick="barajarDeNuevo()">Barajar de nuevo</button>
        </div>
      `;
      renderFiltros();
    }

    function renderFiltros() {
      const cont = document.getElementById('filtros');
      const opciones = [
        ['todas', 'Todas'],
        ['basica', 'Básica'],
        ['intermedia', 'Intermedia'],
        ['avanzada', 'Avanzada'],
      ];
      cont.innerHTML = opciones
        .map(
          ([valor, nombre]) =>
            `<button class="filtro-chip ${valor === dificultadActiva ? 'active' : ''}" data-valor="${valor}" onclick="elegirDificultad('${valor}')">${nombre}</button>`
        )
        .join('');
    }

    async function cargarFlashcards() {
      const cont = document.getElementById('contenido');
      try {
        const { data, error } = await sb
          .from('flashcards')
          .select('id,tema,pregunta,respuesta,dificultad')
          .eq('publicado', true);
        if (error) throw error;
        todas = data || [];
        if (todas.length === 0) {
          cont.innerHTML = '<div class="estado">Todavía no hay flashcards publicadas.</div>';
          return;
        }
        aplicarFiltro();
      } catch (e) {
        cont.innerHTML = '<div class="estado">No se pudo cargar las flashcards. Intenta recargar la página.</div>';
      }
    }

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'auth.html'; return; }

      const name = user.user_metadata?.full_name || user.email.split('@')[0];
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-avatar').textContent = name[0].toUpperCase();

      cargarFlashcards();
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '../index.html';
    }

    init();
  </script>
</body>
</html>
